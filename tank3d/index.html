// ==================== COLLISION DETECTION (贴合形状) ====================
function obstacleDriveRadius(ob) {
  if (ob.hw !== undefined) return Math.max(ob.hw, ob.hd);
  return ob.type === 'tree' ? ob.trunkR + 0.3 : ob.radius;
}

function checkWorldCollision(x, z, radius) {
  if (x - radius < -MAP_HALF || x + radius > MAP_HALF || z - radius < -MAP_HALF || z + radius > MAP_HALF) return true;
  for (const ob of obstacles) {
    if (ob.hw !== undefined) {
      const dx = Math.max(Math.abs(x - ob.x) - ob.hw, 0);
      const dz = Math.max(Math.abs(z - ob.z) - ob.hd, 0);
      if (dx*dx + dz*dz < radius*radius) return true;
    } else {
      const r = ob.type === 'tree' ? ob.trunkR + 0.3 : ob.radius;
      const dx = x - ob.x, dz = z - ob.z;
      if (dx*dx + dz*dz < (radius + r) * (radius + r)) return true;
    }
  }
  return false;
}

function pushFromObstacles(pos, radius) {
  let pushed = false;
  const bx = Math.max(-MAP_HALF+radius, Math.min(MAP_HALF-radius, pos.x));
  const bz = Math.max(-MAP_HALF+radius, Math.min(MAP_HALF-radius, pos.z));
  if (bx !== pos.x || bz !== pos.z) pushed = true;
  pos.x = bx; pos.z = bz;
  for (const ob of obstacles) {
    if (ob.hw !== undefined) {
      const cx = Math.max(ob.x - ob.hw, Math.min(pos.x, ob.x + ob.hw));
      const cz = Math.max(ob.z - ob.hd, Math.min(pos.z, ob.z + ob.hd));
      let dx = pos.x - cx, dz = pos.z - cz;
      const d2 = dx*dx + dz*dz;
      if (d2 < radius*radius) {
        pushed = true;
        if (d2 > 1e-6) {
          const d = Math.sqrt(d2);
          pos.x = cx + (dx/d) * radius;
          pos.z = cz + (dz/d) * radius;
        } else {
          const pxp = ob.x + ob.hw - pos.x, pxn = pos.x - (ob.x - ob.hw);
          const pzp = ob.z + ob.hd - pos.z, pzn = pos.z - (ob.z - ob.hd);
          const m = Math.min(pxp, pxn, pzp, pzn);
          if (m === pxp) pos.x = ob.x + ob.hw + radius;
          else if (m === pxn) pos.x = ob.x - ob.hw - radius;
          else if (m === pzp) pos.z = ob.z + ob.hd + radius;
          else pos.z = ob.z - ob.hd - radius;
        }
      }
    } else {
      const r = ob.type === 'tree' ? ob.trunkR + 0.3 : ob.radius;
      const dx = pos.x - ob.x, dz = pos.z - ob.z, dist = Math.sqrt(dx*dx+dz*dz);
      const minDist = radius + r;
      if (dist < minDist && dist > 0.001) {
        const overlap = minDist - dist;
        pos.x += (dx/dist) * overlap;
        pos.z += (dz/dist) * overlap;
        pushed = true;
      }
    }
  }
  return pushed;
}

// 弹药与障碍物的形状检测 (矩形建筑/残墙 / 树干+树冠 / 圆柱岩石), 返回命中的障碍物
function shellHitsObstacle(pos, r) {
  for (const ob of obstacles) {
    const relY = pos.y - ob.y;
    if (ob.hw !== undefined) {
      if (relY > ob.height || relY < -0.5) continue;
      const dx = Math.max(Math.abs(pos.x - ob.x) - ob.hw, 0);
      const dz = Math.max(Math.abs(pos.z - ob.z) - ob.hd, 0);
      if (dx*dx + dz*dz < r*r) return ob;
    } else if (ob.type === 'tree') {
      const ddx = pos.x - ob.x, ddz = pos.z - ob.z;
      const d2 = ddx*ddx + ddz*ddz;
      if (relY >= 0 && relY < 3 && d2 < (ob.trunkR + r) * (ob.trunkR + r)) return ob;
      if (relY >= 2 && relY < 7) {
        const cr = 2 * (1 - (relY - 2) / 5) + r;
        if (d2 < cr*cr) return ob;
      }
    } else {
      if (relY > ob.height || relY < -0.5) continue;
      const ddx = pos.x - ob.x, ddz = pos.z - ob.z;
      if (ddx*ddx + ddz*ddz < (ob.radius + r) * (ob.radius + r)) return ob;
    }
  }
  return null;
}

// ==================== 可破坏建筑 ====================
function damageObstacle(ob, dmg, pos) {
  if (ob.hp === undefined || ob.destroyed) return;
  ob.hp -= dmg;
  spawnParticles(pos, 4, 0x9a8f80, 0.5, 4);
  if (ob.hp <= 0) collapseObstacle(ob);
}

function collapseObstacle(ob, quiet) {
  ob.destroyed = true;
  scene.remove(ob.mesh);
  const idx = obstacles.indexOf(ob);
  if (idx >= 0) obstacles.splice(idx, 1);
  rebuildBlockers();
  minimapDirty = true;
  updateNavAround(ob);
  if (Math.max(ob.hw, ob.hd) > 1.2) {
    const r = Math.max(ob.hw, ob.hd) * 1.2 + 1;
    const h = Math.min(1.6, 0.4 + ob.height * 0.1);
    addRubbleMound(ob.x, ob.z, r, h, ob.baseColor || 0x8a7f72);
  }
  const cpos = new THREE.Vector3(ob.x, groundHeight(ob.x, ob.z) + 1.5, ob.z);
  if (quiet) {
    spawnParticles(cpos, 6, ob.baseColor || 0x8a7f72, 0.5, 4);
    spawnSmoke(cpos, 3);
    playNoise(0.2, 0.3, 200);
  } else {
    explode(cpos, false);
    spawnSmoke(cpos, 14);
    playNoise(0.5, 0.5, 110);
  }
}

// ==================== 冲撞 ====================
// 车速 >= 2 时碾碎可压毁障碍 (沙袋/石墙/断墙/路障), 自身受少量冲撞伤害
function crushObstacles(tank) {
  const spd = Math.abs(tank.speed);
  if (spd < 2) return;
  const dir = tank.speed >= 0 ? 1 : -1;
  const lx = tank.mesh.position.x + Math.sin(tank.yaw) * dir * 1.2;
  const lz = tank.mesh.position.z + Math.cos(tank.yaw) * dir * 1.2;
  const r = 3.4;
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    if (!ob.crushable) continue;
    let hit;
    if (ob.hw !== undefined) {
      const ddx = Math.max(Math.abs(lx - ob.x) - ob.hw, 0);
      const ddz = Math.max(Math.abs(lz - ob.z) - ob.hd, 0);
      hit = ddx*ddx + ddz*ddz < r*r;
    } else {
      const ddx = lx - ob.x, ddz = lz - ob.z;
      const rr = r + (ob.radius || 1);
      hit = ddx*ddx + ddz*ddz < rr*rr;
    }
    if (hit) {
      collapseObstacle(ob, true);
      damageTank(tank, Math.min(10, (ob.hp || 20) * 0.15), null);
      tank.speed *= 0.78;
    }
  }
}

// 坦克互撞: 分离 + 按相对撞击速度结算伤害
function tankRamCheck(dt) {
  const all = [player, ...enemies, ...allies].filter(t => t.alive);
  for (let i = 0; i < all.length; i++) {
    for (let j = i + 1; j < all.length; j++) {
      const a = all[i], b = all[j];
      const dx = b.mesh.position.x - a.mesh.position.x;
      const dz = b.mesh.position.z - a.mesh.position.z;
      const d = Math.sqrt(dx*dx + dz*dz);
      if (d < 4.6 && d > 0.001) {
        const overlap = (4.6 - d) / 2;
        const ux = dx / d, uz = dz / d;
        a.mesh.position.x -= ux * overlap; a.mesh.position.z -= uz * overlap;
        b.mesh.position.x += ux * overlap; b.mesh.position.z += uz * overlap;
        const avx = Math.sin(a.yaw) * a.speed, avz = Math.cos(a.yaw) * a.speed;
        const bvx = Math.sin(b.yaw) * b.speed, bvz = Math.cos(b.yaw) * b.speed;
        const rel = (avx - bvx) * ux + (avz - bvz) * uz;
        if (rel > 3) {
          const dmg = (rel - 3) * 2.2;
          damageTank(a, dmg * 0.5, b);
          damageTank(b, dmg * 0.5, a);
          a.speed *= 0.35; b.speed *= 0.35;
          const mx = (a.mesh.position.x + b.mesh.position.x) / 2;
          const mz = (a.mesh.position.z + b.mesh.position.z) / 2;
          spawnParticles(new THREE.Vector3(mx, groundHeight(mx, mz) + 1.2, mz), 5, 0xffaa33, 0.4, 4);
          playNoise(0.15, 0.35, 250);
        }
      }
    }
  }
}

function rebuildBlockers() {
  losBlockers.length = 0;
  cameraBlockers.length = 0;
  for (const o of obstacles) {
    losBlockers.push(o.mesh);
    cameraBlockers.push(o.mesh);
  }
}

// ==================== DAMAGE ====================
function damageTank(tank, amount, source) {
  if (!tank.alive) return;
  if (tank === player && (invulnTimer > 0 || bomberActive)) return;
  tank.hp -= amount;
  if (tank === player) {
    showDamageFlash();
    playNoise(0.1, 0.2, 400);
  } else if (source === player) {
    if (tank.team === 'red') {
      showHitmark();
      score += Math.round(amount);
    } else {
      score = Math.max(0, score - Math.round(amount));
    }
  }
  if (tank.hp <= 0) {
    tank.hp = 0;
    die(tank, source);
    if (source === player && tank !== player) {
      if (tank.team === 'red') {
        kills++; score += 100; playNoise(0.08, 0.3, 800);
        streak++;
        if (streak >= 3 && !bomberActive) bomberReady = true;
      }
      else { score = Math.max(0, score - 80); }
    }
  }
}

function die(tank, source) {
  if (!tank.alive) return;
  tank.alive = false; tank.speed = 0;
  const pos = new THREE.Vector3();
  tank.mesh.getWorldPosition(pos);
  explode(pos, false);
  tank.mesh.traverse(c => { if (c.material && c.material.color) { c.material.color.set(0x333333); c.material.emissive && c.material.emissive.set(0x000000); } });
  if (tank === player) {
    deaths++;
    sniperMode = false;
    streak = 0;
    score = Math.max(0, score - 30);
    respawnCountdown = 4;
    document.getElementById('respawn-timer').textContent = '4';
    document.getElementById('respawn-overlay').classList.add('show');
  } else {
    tank.wreckTimer = 6;
  }
}

function respawnPlayer() {
  scene.remove(player.mesh);
  const fresh = createTank(PLAYER_CLASS.color, PLAYER_CLASS.model);
  player.mesh = fresh.mesh;
  player.mesh.scale.setScalar(PLAYER_CLASS.scale);
  player.hull = fresh.hull;
  player.turretPivot = fresh.turretPivot;
  player.barrelPivot = fresh.barrelPivot;
  player.wheels = fresh.wheels;
  player.rubberInst = fresh.rubberInst;
  player.discInst = fresh.discInst;
  player.trackInst = fresh.trackInst;
  player.trackOffset = 0; player.wheelAngle = 0;
  player.hp = player.maxHp; player.alive = true;
  player.speed = 0; player.gear = 0; player.pendingGear = 0;
  player.shiftTimer = 0; player.turnVel = 0;
  player.reload = 0; player.recoil = 0; player.mgCool = 0;
  let sx = 0, sz = 0, valid = false, tries = 0;
  do {
    sx = -MAP_HALF + 30 + Math.random()*(MAP_SIZE-60);
    sz = -MAP_HALF + 30 + Math.random()*(MAP_SIZE-60);
    valid = !checkWorldCollision(sx, sz, 5);
    if (valid) {
      for (const en of enemies) {
        if (!en.alive) continue;
        const ddx = sx - en.mesh.position.x, ddz = sz - en.mesh.position.z;
        if (Math.sqrt(ddx*ddx+ddz*ddz) < 100) { valid = false; break; }
      }
    }
    tries++;
  } while (!valid && tries < 200);
  player.mesh.position.set(sx, groundHeight(sx, sz), sz);
  player.yaw = Math.random() * Math.PI * 2;
  player.mesh.rotation.y = player.yaw;
  scene.add(player.mesh);
  invulnTimer = 3;
  document.getElementById('respawn-overlay').classList.remove('show');
}

function endGame(reason) {
  gameOver = true;
  document.exitPointerLock();
  document.getElementById('go-title').textContent = reason || '战斗结束';
  document.getElementById('go-kills').textContent = kills;
  document.getElementById('go-deaths').textContent = deaths;
  document.getElementById('go-points').textContent = score;
  document.getElementById('game-over').classList.add('show');
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('respawn-overlay').classList.remove('show');
  document.getElementById('pause-overlay').classList.remove('show');
}

// ==================== AI LOGIC (敌我通用) ====================
const losRay = new THREE.Raycaster();
const losBlockers = obstacles.map(o => o.mesh);

function friendlyInLine(shooter, tx, tz) {
  const sx = shooter.mesh.position.x, sz = shooter.mesh.position.z;
  const ddx = tx - sx, ddz = tz - sz;
  const len = Math.sqrt(ddx*ddx + ddz*ddz) || 1;
  const ux = ddx/len, uz = ddz/len;
  const mates = shooter.team === 'red' ? enemies : [player, ...allies];
  for (const m of mates) {
    if (m === shooter || !m.alive) continue;
    const mx = m.mesh.position.x - sx, mz = m.mesh.position.z - sz;
    const proj = mx*ux + mz*uz;
    if (proj < 4 || proj > len) continue;
    const perp = Math.abs(mx*uz - mz*ux);
    if (perp < 3.5) return true;
  }
  return false;
}

// 视野检测: 障碍物 + 地形双重遮挡
const _losFrom = new THREE.Vector3();
const _losDir = new THREE.Vector3();
function canSee(t, f) {
  const ex = t.mesh.position.x, ez = t.mesh.position.z;
  const px = f.mesh.position.x, pz = f.mesh.position.z;
  const eyeY = groundHeight(ex, ez) + 2.3;
  const tgtY = groundHeight(px, pz) + 1.8;
  _losDir.set(px - ex, tgtY - eyeY, pz - ez);
  const rlen = _losDir.length();
  _losDir.normalize();
  losRay.set(_losFrom.set(ex, eyeY, ez), _losDir);
  losRay.far = Math.max(0, rlen - 3);
  if (losRay.intersectObjects(losBlockers, true).length > 0) return false;
  if (terrainBlocksLine(ex, eyeY, ez, px, tgtY, pz)) return false;
  return true;
}

function pickWander(t) {
  // 队友巡逻锚定玩家周围, 敌军以自身为中心漫游
  const anchorX = (t.team === 'green' && player.alive) ? player.mesh.position.x : t.mesh.position.x;
  const anchorZ = (t.team === 'green' && player.alive) ? player.mesh.position.z : t.mesh.position.z;
  const rMin = t.team === 'green' ? 15 : 30;
  const rMax = t.team === 'green' ? 45 : 90;
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = rMin + Math.random() * (rMax - rMin);
    const wx = anchorX + Math.sin(a) * r;
    const wz = anchorZ + Math.cos(a) * r;
    if (Math.abs(wx) > MAP_HALF - 12 || Math.abs(wz) > MAP_HALF - 12) continue;
    if (!checkWorldCollision(wx, wz, 3.3)) { t.wanderX = wx; t.wanderZ = wz; return; }
  }
  t.wanderX = t.mesh.position.x;
  t.wanderZ = t.mesh.position.z;
}

function navMaintain(t, dt, gx, gz, active) {
  t.replanTimer -= dt;
  if (!active) { t.path = null; return; }
  const goalMoved = Math.hypot(gx - t.goalX, gz - t.goalZ) > 18;
  if (t.replanTimer <= 0 && (!t.path || goalMoved) && navPlansThisFrame < 1) {
    navPlansThisFrame++;
    t.replanTimer = 1.6 + Math.random() * 0.8;
    t.path = navFindPath(t.mesh.position.x, t.mesh.position.z, gx, gz);
    t.pathIdx = 0;
    t.goalX = gx; t.goalZ = gz;
  }
  if (t.path) {
    while (t.pathIdx < t.path.length) {
      const wp = t.path[t.pathIdx];
      if (Math.hypot(wp.x - t.mesh.position.x, wp.z - t.mesh.position.z) < 4.5) t.pathIdx++;
      else break;
    }
    if (t.pathIdx >= t.path.length) t.path = null;
  }
}

function updateAI(enemy, dt) {
  alignTankToGround(enemy, dt);
  if (!enemy.alive) {
    if (enemy.wreckTimer > 0) {
      enemy.wreckTimer -= dt;
      if (enemy.wreckTimer <= 0) {
        scene.remove(enemy.mesh);
        const arr = enemy.team === 'red' ? enemies : allies;
        const idx = arr.indexOf(enemy);
        if (idx >= 0) arr.splice(idx, 1);
      } else if (enemy.wreckTimer < 3) {
        spawnSmoke(new THREE.Vector3(enemy.mesh.position.x, enemy.mesh.position.y + 2, enemy.mesh.position.z), 1);
      }
    }
    return;
  }
  enemy.reload = Math.max(0, enemy.reload - dt);
  const foes = enemy.team === 'red' ? [player, ...allies] : enemies;
  const ex = enemy.mesh.position.x, ez = enemy.mesh.position.z;

  // ---- 视野机制: 只锁定视线可及的目标 (不透视障碍物) ----
  if (enemy.target && !enemy.target.alive) enemy.target = null;
  enemy.scanTimer -= dt;
  if (enemy.scanTimer <= 0) {
    enemy.scanTimer = 0.45 + Math.random() * 0.25;
    let best = null, bestD = Infinity;
    for (const f of foes) {
      if (!f.alive) continue;
      const fdx = f.mesh.position.x - ex, fdz = f.mesh.position.z - ez;
      const d = Math.sqrt(fdx*fdx + fdz*fdz);
      if (d > 220 || d >= bestD) continue;
      if (canSee(enemy, f)) { best = f; bestD = d; }
    }
    if (best) {
      if (!enemy.target || !enemy.hasLos ||
          bestD < 0.75 * Math.hypot(enemy.target.mesh.position.x - ex, enemy.target.mesh.position.z - ez)) {
        enemy.target = best;
        enemy.hasLos = true;
      }
      enemy.memoryTimer = 6;
    }
  }

  const target = enemy.target;
  let px = 0, pz = 0, dx = 0, dz = 0, distToPlayer = 1, targetYaw = enemy.yaw;
  if (target) {
    px = target.mesh.position.x; pz = target.mesh.position.z;
    dx = px - ex; dz = pz - ez;
    distToPlayer = Math.sqrt(dx*dx + dz*dz) || 1;
    targetYaw = Math.atan2(dx, dz);
    // 持续视线确认 (0.25s 节流)
    enemy.losTimer -= dt;
    if (enemy.losTimer <= 0) {
      enemy.losTimer = 0.25;
      enemy.hasLos = distToPlayer < 220 && canSee(enemy, target);
      if (enemy.hasLos) {
        enemy.memoryTimer = 6;
        enemy.lastSeenX = px;
        enemy.lastSeenZ = pz;
      }
    }
    if (!enemy.hasLos) {
      enemy.memoryTimer -= dt;
      if (enemy.memoryTimer < 4.5) {
        // 目标脱离视线 1.5s: 解除锁定, 转入目击点搜索
        enemy.target = null;
        enemy.combatState = 'maneuver';
      }
    }
  } else {
    enemy.hasLos = false;
    if (enemy.memoryTimer > 0) enemy.memoryTimer -= dt;
  }
  const engaged = enemy.target !== null;

  // ---- 对空火力 (玩家轰炸机 / AI 托管机均为目标) ----
  if (enemy.team === 'red' && ((bomberActive && bomber) || aiPlanes.length > 0)) {
    enemy.aaCool -= dt;
    if (enemy.aaCool <= 0) {
      let airTgt = null, airD = Infinity;
      if (bomberActive && bomber) {
        const d = Math.hypot(bomber.mesh.position.x - ex, bomber.mesh.position.z - ez);
        if (d < 170) { airTgt = bomber; airD = d; }
      }
      for (const ap of aiPlanes) {
        const d = Math.hypot(ap.mesh.position.x - ex, ap.mesh.position.z - ez);
        if (d < 170 && d < airD) { airTgt = ap; airD = d; }
      }
      if (airTgt) {
        enemy.aaCool = 0.9 + Math.random() * 1.4;
        fireAA(enemy, airTgt);
      }
    }
  }

  // ---- 战斗状态机: 机动 -> 停车瞄准 -> 开火 -> 机动规避 ----
  if (enemy.evadeTimer > 0) enemy.evadeTimer -= dt;
  const wantFire = engaged && distToPlayer < 200 && enemy.reload < 0.5 && enemy.evadeTimer <= 0;
  if (enemy.combatState !== 'halt') {
    if (wantFire && enemy.hasLos) { enemy.combatState = 'halt'; enemy.haltTimer = 0; }
  } else {
    enemy.haltTimer += dt;
    if (!wantFire || enemy.haltTimer > 6 || (!enemy.hasLos && enemy.haltTimer > 1.5)) enemy.combatState = 'maneuver';
  }

  const nxDir = dx / distToPlayer, nzDir = dz / distToPlayer;
  const sideX = -nzDir * enemy.strafeDir, sideZ = nxDir * enemy.strafeDir;

  enemy.strafeTimer -= dt;
  if (enemy.strafeTimer <= 0) {
    enemy.strafeTimer = 2.5 + Math.random()*4;
    if (Math.random() < 0.6) enemy.strafeDir *= -1;
    enemy.moveMode = Math.random() < 0.55 ? 'hold' : 'orbit';
  }

  // ---- 寻路目标: 交战推进 / 目击点搜索 / 巡逻漫游 ----
  let navGoalX = px, navGoalZ = pz, navActive = false;
  if (engaged) {
    navActive = distToPlayer > enemy.standDist + 30 && enemy.combatState !== 'halt';
  } else if (enemy.memoryTimer > 0) {
    navGoalX = enemy.lastSeenX; navGoalZ = enemy.lastSeenZ;
    navActive = true;
  } else {
    enemy.wanderTimer -= dt;
    if (enemy.wanderTimer <= 0) {
      enemy.wanderTimer = 7 + Math.random() * 6;
      pickWander(enemy);
    }
    navGoalX = enemy.wanderX; navGoalZ = enemy.wanderZ;
    navActive = true;
  }
  navMaintain(enemy, dt, navGoalX, navGoalZ, navActive);

  let throttleCmd = 0;
  if (enemy.combatState === 'halt') {
    // 停车瞄准: 刹停, 缓慢正面朝敌, 等弹道计算稳定
    const hYawDiff = normalizeAngle(targetYaw - enemy.yaw);
    const hMaxTurn = 0.4 * dt;
    enemy.yaw += Math.max(-hMaxTurn, Math.min(hMaxTurn, hYawDiff));
    updateDrive(enemy, 0, dt);
  } else {
    let desiredYaw = targetYaw, throttle = 0;
    if (enemy.reverseTimer > 0) {
      // 卡死自救: 倒车摆脱
      enemy.reverseTimer -= dt;
      throttle = -1;
      desiredYaw = enemy.yaw + enemy.strafeDir * 0.8;
    } else if (!engaged) {
      // 搜索/巡逻: 前往目击点或漫游点
      const gdx = navGoalX - ex, gdz = navGoalZ - ez;
      const gd = Math.hypot(gdx, gdz);
      if (gd > (enemy.memoryTimer > 0 ? 9 : 6)) {
        if (enemy.path && enemy.pathIdx < enemy.path.length) {
          const wp = enemy.path[enemy.pathIdx];
          desiredYaw = Math.atan2(wp.x - ex, wp.z - ez);
        } else {
          desiredYaw = Math.atan2(gdx, gdz);
        }
        throttle = 1;
      } else {
        if (enemy.memoryTimer > 0) enemy.memoryTimer = 0;   // 目击点扑空 -> 转巡逻
        enemy.wanderTimer = 0;
        desiredYaw = enemy.yaw;
      }
    } else if (distToPlayer > enemy.standDist + 30) {
      // 沿 A* 路径推进
      if (enemy.path && enemy.pathIdx < enemy.path.length) {
        const wp = enemy.path[enemy.pathIdx];
        desiredYaw = Math.atan2(wp.x - ex, wp.z - ez);
      } else {
        desiredYaw = Math.atan2(nxDir + sideX*0.35, nzDir + sideZ*0.35);
      }
      throttle = 1;
    } else if (distToPlayer < enemy.standDist - 25) {
      desiredYaw = targetYaw;
      throttle = -1;
    } else if (enemy.moveMode === 'orbit') {
      desiredYaw = Math.atan2(sideX, sideZ);
      throttle = 1;
    }
    if (enemy.avoidTimer > 0) {
      enemy.avoidTimer -= dt;
      desiredYaw = desiredYaw + enemy.strafeDir * 1.2;
      throttle = 1;
    }

    const yawDiff = normalizeAngle(desiredYaw - enemy.yaw);
    const maxTurn = 1.0 * dt;
    enemy.yaw += Math.max(-maxTurn, Math.min(maxTurn, yawDiff));
    if (throttle > 0 && Math.abs(yawDiff) > 0.6 && enemy.reverseTimer <= 0) throttle = 0;

    throttleCmd = throttle;
    updateDrive(enemy, throttle, dt);
  }

  crushObstacles(enemy);

  if (Math.abs(enemy.speed) > 0.05) {
    const nx = ex + Math.sin(enemy.yaw) * enemy.speed * dt;
    const nz = ez + Math.cos(enemy.yaw) * enemy.speed * dt;
    if (!checkWorldCollision(nx, nz, 3)) {
      enemy.mesh.position.x = nx; enemy.mesh.position.z = nz;
    } else {
      enemy.speed *= 0.3;
      enemy.strafeDir *= -1;
      enemy.avoidTimer = 1.0;
    }
  }

  pushFromObstacles(enemy.mesh.position, 3);
  spinWheels(enemy, dt);

  // ---- 卡死检测: 有油门却没位移 -> 倒车重规划 ----
  const actualMove = Math.hypot(enemy.mesh.position.x - ex, enemy.mesh.position.z - ez);
  if (throttleCmd !== 0 && actualMove < Math.abs(enemy.speed) * dt * 0.4) {
    enemy.stuckTimer += dt;
  } else {
    enemy.stuckTimer = Math.max(0, enemy.stuckTimer - dt * 2);
  }
  if (enemy.stuckTimer > 1.1) {
    enemy.stuckTimer = 0;
    if (throttleCmd < 0) { enemy.avoidTimer = 1.2; enemy.reverseTimer = 0; }
    else enemy.reverseTimer = 0.9;
    enemy.path = null;
    enemy.replanTimer = 0;
    enemy.strafeDir *= -1;
  }

  // ---- 瞄准: 锁定目标时预判射击, 无目标时炮塔归位 ----
  if (engaged) {
    const flight = distToPlayer / 150;
    const pvx = Math.sin(target.yaw || 0) * (target.speed || 0);
    const pvz = Math.cos(target.yaw || 0) * (target.speed || 0);
    const aimX = px + pvx * flight * enemy.leadErr;
    const aimZ = pz + pvz * flight * enemy.leadErr;
    const drop = 0.5 * gravity * flight * flight;
    aimTurret(enemy, new THREE.Vector3(aimX, groundHeight(aimX, aimZ) + 1.5 + drop, aimZ), dt);

    const angVel = normalizeAngle(targetYaw - enemy.lastTargetYaw) / Math.max(dt, 0.001);
    enemy.lastTargetYaw = targetYaw;
    let bloom = 0.012 + (Math.abs(enemy.speed) / 11) * 0.03 + Math.min(0.02, Math.abs(angVel) * 0.15);
    if (!enemy.hasLos) bloom = 0.06;
    bloom = Math.min(0.06, bloom * enemy.skill);
    if (enemy.aimSpread < bloom) enemy.aimSpread = Math.min(bloom, enemy.aimSpread + dt * 0.3);
    else enemy.aimSpread += (bloom - enemy.aimSpread) * Math.min(1, dt / 1.1);

    const aimYaw = Math.atan2(aimX - ex, aimZ - ez);
    const turretYaw = normalizeAngle(enemy.turretPivot.rotation.y + enemy.yaw);
    const aimDiff = Math.abs(normalizeAngle(aimYaw - turretYaw));
    if (enemy.combatState === 'halt' && Math.abs(enemy.speed) < 0.5 &&
        aimDiff < 0.1 && distToPlayer < 200 && enemy.reload <= 0 &&
        enemy.hasLos && enemy.aimSpread < 0.028 && !friendlyInLine(enemy, px, pz) &&
        Math.random() < dt * 3) {
      shoot(enemy, true);
      if (enemy.reload > 0) {
        enemy.combatState = 'maneuver';
        enemy.evadeTimer = 2.5 + Math.random()*2;
        enemy.moveMode = 'orbit';
        if (Math.random() < 0.5) enemy.strafeDir *= -1;
      }
    }
  } else {
    // 未发现目标: 炮塔缓慢归中, 散布回升
    enemy.turretPivot.rotation.y = lerpAngle(enemy.turretPivot.rotation.y, 0, dt * 1.0);
    enemy.barrelPivot.rotation.x += (0 - enemy.barrelPivot.rotation.x) * Math.min(1, dt * 3);
    enemy.aimSpread = Math.min(0.06, enemy.aimSpread + dt * 0.08);
  }
}

// ==================== SHELL PHYSICS ====================
const gravity = 3.5;
function updateShells(dt) {
  for (let i = shells.length-1; i >= 0; i--) {
    const s = shells[i];
    s.vel.y -= gravity * dt;
    s.mesh.position.x += s.vel.x * dt;
    s.mesh.position.y += s.vel.y * dt;
    s.mesh.position.z += s.vel.z * dt;
    s.life -= dt;
    let exploded = false;
    // Ground (地形+废墟)
    if (s.mesh.position.y <= groundHeight(s.mesh.position.x, s.mesh.position.z) + 0.25) { explode(s.mesh.position, true); exploded = true; }
    // Obstacles (形状检测 + 可破坏)
    if (!exploded) {
      const hitOb = shellHitsObstacle(s.mesh.position, 0.25);
      if (hitOb) {
        explode(s.mesh.position, true); exploded = true;
        damageObstacle(hitOb, 30 + Math.random()*15, s.mesh.position);
      }
    }
    // Hit tanks
    if (!exploded) {
      const allTanks = [player, ...enemies, ...allies];
      for (const tank of allTanks) {
        if (!tank.alive) continue;
        if (tank === s.shooter) continue;
        const tpos = new THREE.Vector3(); tank.mesh.getWorldPosition(tpos);
        const ddx = s.mesh.position.x - tpos.x, ddz = s.mesh.position.z - tpos.z;
        const ddy = s.mesh.position.y - tpos.y;
        if (Math.sqrt(ddx*ddx+ddz*ddz) < 2.8 && Math.abs(ddy) < 3) {
          damageTank(tank, s.dmg || (25 + Math.random()*15), s.shooter);
          explode(s.mesh.position, true); exploded = true; break;
        }
      }
    }
    // 空战兼容: 敌方炮弹可命中轰炸机
    if (!exploded && bomberActive && bomber && s.shooter && s.shooter.team === 'red') {
      if (s.mesh.position.distanceTo(bomber.mesh.position) < 4.5) {
        bomber.hp -= 40;
        explode(s.mesh.position, true); exploded = true;
        showDamageFlash();
        if (bomber.hp <= 0) crashBomber();
      }
    }
    if (exploded || s.life <= 0) {
      scene.remove(s.mesh);
      if (s.life <= 0 && !exploded) explode(s.mesh.position, true);
      shells.splice(i, 1);
      const psi = playerShells.indexOf(s);
      if (psi >= 0) playerShells.splice(psi, 1);
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.vel.y -= 3 * dt;
    p.mesh.position.x += p.vel.x * dt;
    p.mesh.position.y += p.vel.y * dt;
    p.mesh.position.z += p.vel.z * dt;
    p.life -= dt;
    if (p.isSmoke) {
      p.mesh.scale.addScalar(dt * 2);
      p.mesh.material.opacity = Math.max(0, p.life / 2);
    } else {
      p.mesh.rotation.x += p.rotSpeed * dt;
      p.mesh.rotation.y += p.rotSpeed * 0.7 * dt;
      p.mesh.material.opacity = Math.max(0, p.life / 0.8);
    }
    if (p.life <= 0 || p.mesh.position.y < -15) {
      scene.remove(p.mesh);
      if (p.mesh.material) p.mesh.material.dispose();
      if (p.mesh.geometry) p.mesh.geometry.dispose();
      particles.splice(i, 1);
    }
  }
}

function updateFlashes(dt) {
  for (let i = flashes.length-1; i >= 0; i--) {
    flashes[i].life -= dt;
    flashes[i].light.intensity = flashes[i].light.intensity * 0.7;
    if (flashes[i].life <= 0) { scene.remove(flashes[i].light); flashes.splice(i, 1); }
  }
}

// ==================== PLAYER MOVEMENT ====================
function updatePlayer(dt) {
  if (!player.alive) return;
  if (bomberActive) {
    updateDrive(player, 0, dt);
    player.reload = Math.max(0, player.reload - dt);
    return;
  }
  let throttle = 0, steer = 0;
  if (keys['w'] || keys['arrowup']) throttle += 1;
  if (keys['s'] || keys['arrowdown']) throttle -= 1;
  if (keys['a'] || keys['arrowleft']) steer += 1;
  if (keys['d'] || keys['arrowright']) steer -= 1;

  const steerFlip = player.speed < -0.3 ? -1 : 1;
  player.turnVel += (steer * steerFlip * (player.turnRate || 1.1) - player.turnVel) * Math.min(1, dt * 5);
  if (Math.abs(player.turnVel) > 0.001) player.yaw += player.turnVel * dt;

  updateDrive(player, throttle, dt);

  crushObstacles(player);

  if (Math.abs(player.speed) > 0.05) {
    const fwd = new THREE.Vector3(Math.sin(player.yaw), 0, Math.cos(player.yaw));
    const testPos = new THREE.Vector3(
      player.mesh.position.x + fwd.x * player.speed * dt,
      0,
      player.mesh.position.z + fwd.z * player.speed * dt
    );
    if (pushFromObstacles(testPos, 3)) player.speed *= 0.6;
    player.mesh.position.x = testPos.x;
    player.mesh.position.z = testPos.z;
  }
  spinWheels(player, dt);

  // Recoil
  if (player.recoil > 0) {
    player.barrelPivot.position.z = 0.9 - player.recoil * 1.2;
    player.recoil -= dt * 2;
    if (player.recoil < 0) { player.recoil = 0; player.barrelPivot.position.z = 0.9; }
  }
  player.reload = Math.max(0, player.reload - dt);
  player.mgCool = Math.max(0, (player.mgCool || 0) - dt);
  if (keys[' '] && player.mgCool <= 0) fireMG();
}

// ==================== CAMERA (第三人称) ====================
const camRaycaster = new THREE.Raycaster();
const cameraBlockers = obstacles.filter(o => o.type !== 'tree').map(o => o.mesh);
function updateCamera(dt) {
  if (bomberActive && bomber) {
    zoomFov += (55 - zoomFov) * Math.min(1, dt * 10);
    camera.fov = zoomFov;
    camera.updateProjectionMatrix();
    // 投弹跟拍: 追踪炸弹直至爆炸
    if (bombCamMode === 1 && bombCamBomb) {
      const bp2 = bombCamBomb.mesh.position;
      const v = bombCamBomb.vel;
      const hv = Math.max(8, Math.hypot(v.x, v.z));
      bombCamViewPos.set(
        bp2.x - (v.x / hv) * 13,
        Math.max(bp2.y + 7, groundHeight(bp2.x, bp2.z) + 3),
        bp2.z - (v.z / hv) * 13
      );
      camera.position.copy(bombCamViewPos);
      camera.lookAt(bp2);
      return;
    }
    // 爆炸停留 1 秒
    if (bombCamMode === 2) {
      camera.position.copy(bombCamViewPos);
      const gy2 = groundHeight(camera.position.x, camera.position.z) + 2.5;
      if (camera.position.y < gy2) camera.position.y = gy2;
      camera.lookAt(bombCamPos);
      return;
    }
    // 战雷式自由环绕: 相机看向视线方向, 机体追随
    const cpv = Math.cos(cameraPitch), spv = Math.sin(cameraPitch);
    const vDir = new THREE.Vector3(Math.sin(cameraYaw) * cpv, -spv, Math.cos(cameraYaw) * cpv);
    const bp = bomber.mesh.position;
    const camPos = new THREE.Vector3(
      bp.x - vDir.x * planeCamDist,
      bp.y - vDir.y * planeCamDist + 3.5,
      bp.z - vDir.z * planeCamDist
    );
    const gy = groundHeight(camPos.x, camPos.z) + 2;
    if (camPos.y < gy) camPos.y = gy;
    camera.position.copy(camPos);
    camera.lookAt(bp.x + vDir.x * 60, bp.y + vDir.y * 60, bp.z + vDir.z * 60);
    return;
  }
  const targetFov = sniperMode ? sniperFov : 55;
  zoomFov += (targetFov - zoomFov) * Math.min(1, dt * 10);
  camera.fov = zoomFov;
  camera.updateProjectionMatrix();

  const cp = Math.cos(cameraPitch), sp = Math.sin(cameraPitch);
  const viewDir = new THREE.Vector3(Math.sin(cameraYaw) * cp, -sp, Math.cos(cameraYaw) * cp);

  if (sniperMode) {
    const gunPos = new THREE.Vector3();
    player.turretPivot.getWorldPosition(gunPos);
    gunPos.y += 0.6;
    camera.position.copy(gunPos).addScaledVector(viewDir, 1.2);
    camera.lookAt(camera.position.clone().add(viewDir));
    return;
  }

  const p = player.mesh.position;
  const pivot = new THREE.Vector3(p.x, p.y + 2.5, p.z);

  let dist = cameraDistance;
  const back = viewDir.clone().negate();
  camRaycaster.set(pivot, back);
  camRaycaster.far = dist;
  const hits = camRaycaster.intersectObjects(cameraBlockers, true);
  if (hits.length > 0) dist = Math.max(2.5, hits[0].distance - 0.8);

  const camPos = pivot.clone().addScaledVector(back, dist);
  camPos.y += 1.8;
  const groundY = groundHeight(camPos.x, camPos.z) + 1.0;
  if (camPos.y < groundY) camPos.y = groundY;
  camera.position.copy(camPos);
  camera.lookAt(camPos.clone().add(viewDir.clone().multiplyScalar(50)));
}

// ==================== HUD ====================
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const mapScale = 130 / MAP_SIZE;
const minimapStatic = document.createElement('canvas');
minimapStatic.width = 130; minimapStatic.height = 130;
const msCtx = minimapStatic.getContext('2d');
let minimapDirty = true;

// 绿色圆圈: 炮口实际指向 (准星保持屏幕中央)
const gunRay = new THREE.Raycaster();
const gunMarkerEl = document.getElementById('gun-marker');
const velMarkerEl = document.getElementById('vel-marker');
function updateGunMarker(targets) {
  const muzzle = new THREE.Vector3();
  player.barrelPivot.getWorldPosition(muzzle);
  const dir = new THREE.Vector3();
  player.barrelPivot.getWorldDirection(dir);
  const origin = muzzle.clone().addScaledVector(dir, 4.2);
  gunRay.set(origin, dir);
  gunRay.far = 400;
  const hits = gunRay.intersectObjects(targets, true);
  const objDist = hits.length > 0 ? hits[0].distance : Infinity;
  const gDist = rayGroundDist(origin, dir, 400);
  const useDist = Math.min(objDist, gDist);
  const point = isFinite(useDist)
    ? origin.clone().addScaledVector(dir, useDist)
    : origin.clone().addScaledVector(dir, 300);
  const proj = point.project(camera);
  if (proj.z > 1 || proj.z < -1) { gunMarkerEl.style.display = 'none'; return; }
  gunMarkerEl.style.display = 'block';
  gunMarkerEl.style.left = ((proj.x * 0.5 + 0.5) * innerWidth) + 'px';
  gunMarkerEl.style.top = ((-proj.y * 0.5 + 0.5) * innerHeight) + 'px';
  gunMarkerEl.style.borderColor = player.reload <= 0 ? 'rgba(0,255,80,0.9)' : 'rgba(255,220,0,0.7)';
}

function updateHUD() {
  // HP
  const hpPct = Math.max(0, player.hp / player.maxHp * 100);
  const hpFill = document.getElementById('hp-fill');
  hpFill.style.width = hpPct + '%';
  if (hpPct > 50) hpFill.style.background = '#4caf50';
  else if (hpPct > 25) hpFill.style.background = '#ff9800';
  else hpFill.style.background = '#f44336';
  document.getElementById('hp-val').textContent = Math.ceil(player.hp);

  // Reload
  const reloadPct = player.reloadTime > 0 ? (1 - player.reload / player.reloadTime) * 100 : 100;
  document.getElementById('reload-fill').style.width = reloadPct + '%';
  if (!player.alive || gameOver) gunMarkerEl.style.display = 'none';

  document.getElementById('kill-count').textContent = kills;
  document.getElementById('enemy-count').textContent = enemies.filter(e => e.alive).length;
  document.getElementById('ally-count').textContent = allies.filter(a => a.alive).length;
  document.getElementById('streak-val').textContent = streak;
  const hintEl = document.getElementById('streak-hint');
  if (bomberActive && bomber) {
    hintEl.style.display = 'block';
    const alt = Math.round(bomber.mesh.position.y - groundHeight(bomber.mesh.position.x, bomber.mesh.position.z));
    hintEl.textContent = 'HP ' + Math.max(0, Math.ceil(bomber.hp)) + ' · 速度 ' + Math.round(bomber.speed) + ' · 高度 ' + alt + ' · 炸弹 ' + bombsLeft + '/6 · 左键投弹 空格机枪 W/S油门 A/D横滚';
  } else if (bomberReady) {
    hintEl.style.display = 'block';
    hintEl.textContent = '歼轰-7 就绪 · 按 B 起飞';
  } else {
    hintEl.style.display = 'none';
  }
  if (!bomberActive) velMarkerEl.style.display = 'none';
  document.getElementById('score-val').textContent = score;
  document.getElementById('scope-overlay').style.display = sniperMode ? 'block' : 'none';
  const mm = Math.floor(matchTime / 60), ss = Math.floor(matchTime % 60);
  document.getElementById('match-time').textContent = mm + ':' + (ss < 10 ? '0' : '') + ss;

  // Damage flash
  if (damageFlashTimer > 0) {
    document.getElementById('damage-flash').style.background = `rgba(255,0,0,${damageFlashTimer*2})`;
    damageFlashTimer = Math.max(0, damageFlashTimer - 0.016);
  } else {
    document.getElementById('damage-flash').style.background = 'rgba(255,0,0,0)';
  }

  // Minimap (静态障碍层缓存, 建筑被摧毁时刷新)
  if (minimapDirty) {
    minimapDirty = false;
    msCtx.clearRect(0, 0, 130, 130);
    msCtx.fillStyle = 'rgba(0,0,0,0.7)'; msCtx.fillRect(0, 0, 130, 130);
    msCtx.fillStyle = 'rgba(80,80,80,0.6)';
    for (const ob of obstacles) {
      const mx = (ob.x + MAP_HALF) * mapScale, my = (ob.z + MAP_HALF) * mapScale;
      const mr = (ob.hw !== undefined ? Math.max(ob.hw, ob.hd) : ob.radius) * mapScale;
      msCtx.beginPath(); msCtx.arc(mx, my, Math.max(1, mr), 0, Math.PI*2); msCtx.fill();
    }
  }
  minimapCtx.clearRect(0, 0, 130, 130);
  minimapCtx.drawImage(minimapStatic, 0, 0);
  for (const en of enemies) {
    if (!en.alive) continue;
    const mx = (en.mesh.position.x + MAP_HALF) * mapScale, my = (en.mesh.position.z + MAP_HALF) * mapScale;
    minimapCtx.fillStyle = '#f44336'; minimapCtx.beginPath(); minimapCtx.arc(mx, my, 3, 0, Math.PI*2); minimapCtx.fill();
  }
  for (const al of allies) {
    if (!al.alive) continue;
    const mx = (al.mesh.position.x + MAP_HALF) * mapScale, my = (al.mesh.position.z + MAP_HALF) * mapScale;
    minimapCtx.fillStyle = '#2196f3'; minimapCtx.beginPath(); minimapCtx.arc(mx, my, 3, 0, Math.PI*2); minimapCtx.fill();
  }
  const ppx = (player.mesh.position.x + MAP_HALF) * mapScale, ppy = (player.mesh.position.z + MAP_HALF) * mapScale;
  const pa = cameraYaw;
  minimapCtx.fillStyle = '#4caf50';
  minimapCtx.beginPath();
  minimapCtx.moveTo(ppx + Math.sin(pa)*6, ppy + Math.cos(pa)*6);
  minimapCtx.lineTo(ppx + Math.sin(pa+2.5)*4, ppy + Math.cos(pa+2.5)*4);
  minimapCtx.lineTo(ppx + Math.sin(pa-2.5)*4, ppy + Math.cos(pa-2.5)*4);
  minimapCtx.closePath(); minimapCtx.fill();
  if (bomberActive && bomber) {
    const bx = Math.max(4, Math.min(126, (bomber.mesh.position.x + MAP_HALF) * mapScale));
    const by = Math.max(4, Math.min(126, (bomber.mesh.position.z + MAP_HALF) * mapScale));
    minimapCtx.fillStyle = '#ffd54f';
    minimapCtx.beginPath();
    minimapCtx.moveTo(bx + Math.sin(bomber.yaw)*5, by + Math.cos(bomber.yaw)*5);
    minimapCtx.lineTo(bx + Math.sin(bomber.yaw+2.6)*3.5, by + Math.cos(bomber.yaw+2.6)*3.5);
    minimapCtx.lineTo(bx + Math.sin(bomber.yaw-2.6)*3.5, by + Math.cos(bomber.yaw-2.6)*3.5);
    minimapCtx.closePath(); minimapCtx.fill();
  }
  for (const ap of aiPlanes) {
    const ax = Math.max(4, Math.min(126, (ap.mesh.position.x + MAP_HALF) * mapScale));
    const ay = Math.max(4, Math.min(126, (ap.mesh.position.z + MAP_HALF) * mapScale));
    minimapCtx.strokeStyle = '#ffd54f';
    minimapCtx.lineWidth = 1.2;
    minimapCtx.beginPath();
    minimapCtx.moveTo(ax + Math.sin(ap.yaw)*5, ay + Math.cos(ap.yaw)*5);
    minimapCtx.lineTo(ax + Math.sin(ap.yaw+2.6)*3.5, ay + Math.cos(ap.yaw+2.6)*3.5);
    minimapCtx.lineTo(ax + Math.sin(ap.yaw-2.6)*3.5, ay + Math.cos(ap.yaw-2.6)*3.5);
    minimapCtx.closePath(); minimapCtx.stroke();
  }
}

// ==================== RESPAWN ====================
let enemyRespawnTimer = 0, allyRespawnTimer = 0;
function updateRespawns(dt) {
  if (gameOver) return;
  if (enemies.filter(e => e.alive).length < 3) {
    enemyRespawnTimer += dt;
    if (enemyRespawnTimer > 6) { enemyRespawnTimer = 0; spawnEnemy(); }
  } else {
    enemyRespawnTimer = 0;
  }
  if (allies.filter(a => a.alive).length < 2) {
    allyRespawnTimer += dt;
    if (allyRespawnTimer > 8) { allyRespawnTimer = 0; spawnAlly(); }
  } else {
    allyRespawnTimer = 0;
  }
}

// ==================== MAIN LOOP ====================
let lastTime = performance.now();
function animate(time) {
  requestAnimationFrame(animate);
  let dt = (time - lastTime) / 1000;
  lastTime = time;
  if (dt > 0.1) dt = 0.1;

  // Sun follows player
  sunLight.position.set(player.mesh.position.x + 80, 120, player.mesh.position.z + 60);
  sunLight.target.position.copy(player.mesh.position);
  sunLight.target.updateMatrixWorld();

  if (!gameOver && !paused) {
    matchTime -= dt;
    if (matchTime <= 0) { matchTime = 0; endGame('时间到'); }

    if (!player.alive && respawnCountdown > 0) {
      respawnCountdown -= dt;
      document.getElementById('respawn-timer').textContent = Math.max(0, Math.ceil(respawnCountdown));
      if (respawnCountdown <= 0) respawnPlayer();
    }
    if (invulnTimer > 0) invulnTimer -= dt;
    if (!player.alive) player.mesh.visible = true;
    else if (sniperMode) player.mesh.visible = false;
    else if (invulnTimer > 0) player.mesh.visible = Math.floor(time / 120) % 2 === 0;
    else player.mesh.visible = true;

    updatePlayer(dt);
    alignTankToGround(player, dt);

    // 轰炸机 (连杀奖励)
    if (keys['b'] && bomberReady && !bomberActive && player.alive) callBomber();
    if (bomberActive) {
      updateBomber(dt);
      if (bomberActive) updateBombSight();
    }

    // Aim (驾驶轰炸机时坦克炮塔不跟随)
    if (!bomberActive && player.alive) {
      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      raycaster.set(camera.position, camDir);
      const aimTargets = [...obstacles.map(o => o.mesh)];
      for (const en of enemies) { if (en.alive) aimTargets.push(en.mesh); }
      for (const al of allies) { if (al.alive) aimTargets.push(al.mesh); }
      const hits = raycaster.intersectObjects(aimTargets, true);
      const minAimDist = camera.position.distanceTo(player.mesh.position);
      let objDist = Infinity;
      for (const h of hits) { if (h.distance > minAimDist) { objDist = h.distance; break; } }
      let gDist = rayGroundDist(camera.position, camDir, 500);
      if (gDist <= minAimDist) gDist = Infinity;
      const useDist = Math.min(objDist, gDist);
      const aimPoint = isFinite(useDist)
        ? camera.position.clone().addScaledVector(camDir, useDist)
        : camera.position.clone().addScaledVector(camDir, 300);
      aimTurret(player, aimPoint, dt);

      if (mouseDown && player.reload <= 0) shoot(player, false);

      updateGunMarker(aimTargets);
    }

    // Enemies & Allies
    navPlansThisFrame = 0;
    for (const t of [...enemies]) updateAI(t, dt);
    for (const t of [...allies]) updateAI(t, dt);
    tankRamCheck(dt);
    updateRespawns(dt);
  }

  if (!paused) {
    updateShells(dt);
    updateMG(dt);
    updateBombs(dt);
    updateAA(dt);
    updateAIPlanes(dt);
    updateFallingPlanes(dt);
    updateParticles(dt);
    updateFlashes(dt);
    updateFX(dt);
  }
  updateCamera(dt);
  if (camShake > 0.001) {
    camera.position.x += (Math.random() - 0.5) * camShake;
    camera.position.y += (Math.random() - 0.5) * camShake * 0.5;
    camera.position.z += (Math.random() - 0.5) * camShake;
  }
  updateHUD();
  renderer.render(scene, camera);
}
animate(performance.now());

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

        <div class="card sel" data-tank="medium"><b>M-26 中型坦克</b><span>生命 110 · 火力 25-40<br>装填 2.2s · 极速 11 · 均衡全能</span></div>
        <div class="card" data-tank="heavy"><b>KV-2 重型坦克</b><span>生命 170 · 火力 34-52<br>装填 3.4s · 极速 8 · 装甲怪兽</span></div>
        <div class="card" data-tank="destroyer"><b>猎手 歼击车</b><span>生命 85 · 火力 40-58<br>装填 2.9s · 极速 12.5 · 高初速狙击</span></div>
        <div class="card" data-tank="ztz99a"><b>ZTZ-99A 主战坦克</b><span>生命 150 · 火力 42-60<br>装填 3.0s · 极速 13 · 楔形复合装甲</span></div>
        <div class="card" data-tank="m1a2"><b>M1A2 艾布拉姆斯</b><span>生命 165 · 火力 40-58<br>装填 3.3s · 极速 12.5 · CROWS 武器站</span></div>
      </div>
      <div class="menu-sec">— 选择地图 —</div>
      <div class="cards" id="map-cards">
        <div class="card sel" data-map="town"><b>巷战小镇</b><span>废墟街巷 · 可破坏建筑 · 近距遭遇战</span></div>
        <div class="card" data-map="hills"><b>丘陵旷野</b><span>起伏原野 · 石墙田埂 · 远程对射</span></div>
      </div>
      <div id="start-btn">开 始 战 斗</div>`;
    function wireCards(groupId, key, setter) {
      overlay.querySelectorAll('#' + groupId + ' .card').forEach(c => {
        c.addEventListener('click', ev => {
          ev.stopPropagation();
          overlay.querySelectorAll('#' + groupId + ' .card').forEach(o => o.classList.remove('sel'));
          c.classList.add('sel');
          setter(c.dataset[key]);
        });
      });
    }
    wireCards('tank-cards', 'tank', v => { SELECTED_TANK = v; });
    wireCards('map-cards', 'map', v => { SELECTED_MAP = v; });
    document.getElementById('start-btn').addEventListener('click', ev => {
      ev.stopPropagation();
      try {
        initGame();
        overlay.innerHTML = '点击继续战斗<span class="sub">Click to resume</span>';
        overlay.classList.add('hidden');
        const cv = document.querySelector('canvas:not(#minimap)');
        if (cv) { try { cv.requestPointerLock(); } catch (e) {} }
      } catch (err) {
        fail('游戏初始化失败: ' + err.message);
      }
    });
  }
  function tryNext() {
    if (i >= sources.length) { fail('Three.js 加载失败'); return; }
    const s = document.createElement('script');
    s.src = sources[i++];
    s.onload = function() { showMenu(); };
    s.onerror = function() { tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
</body>
</html>
