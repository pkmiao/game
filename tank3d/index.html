<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克世界 - 3D坦克对战</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#000; font-family:'Microsoft YaHei',sans-serif; user-select:none; -webkit-user-select:none; }
  canvas { display:block; }
  #ui {
    position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;
  }
  #crosshair {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:32px; height:32px;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.8);
  }
  #crosshair::before { top:14px; left:0; width:32px; height:2px; }
  #crosshair::after { top:0; left:14px; width:2px; height:32px; }
  #gun-marker {
    position:absolute; width:34px; height:34px; margin-left:-17px; margin-top:-17px;
    border:2px solid rgba(0,255,80,0.9); border-radius:50%; display:none;
  }
  #vel-marker {
    position:absolute; width:14px; height:14px; margin:-7px 0 0 -7px;
    border:2px solid rgba(255,255,255,0.85); border-radius:50%; display:none;
  }
  #hp-bar {
    position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    width:260px; height:10px; background:rgba(0,0,0,0.6); border-radius:5px;
    border:1px solid rgba(255,255,255,0.3); overflow:hidden;
  }
  #hp-fill {
    width:100%; height:100%; background:#4caf50; border-radius:5px; transition:width 0.3s;
  }
  #reload-bar {
    position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
    width:260px; height:6px; background:rgba(0,0,0,0.6); border-radius:3px;
    border:1px solid rgba(255,255,255,0.2); overflow:hidden;
  }
  #reload-fill {
    width:0%; height:100%; background:#ffeb3b; border-radius:3px; transition:width 0.1s linear;
  }
  #top-info {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    color:#fff; font-size:18px; text-shadow:0 0 8px rgba(0,0,0,0.8);
    letter-spacing:2px;
  }
  #kill-count { color:#ff9800; font-weight:bold; }
  #minimap {
    position:absolute; top:16px; right:16px;
    width:130px; height:130px; border:2px solid rgba(255,255,255,0.4);
    border-radius:6px; background:rgba(0,0,0,0.6);
  }
  #controls-hint {
    position:absolute; bottom:16px; right:20px;
    color:rgba(255,255,255,0.5); font-size:12px; text-align:right;
    line-height:1.6;
  }
  #damage-flash {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(255,0,0,0); pointer-events:none; transition:background 0.1s;
  }
  #hitmark {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#ff0; font-size:14px; font-weight:bold; opacity:0;
    text-shadow:0 0 6px rgba(255,255,0,0.8); pointer-events:none;
    transition:opacity 0.05s;
  }
  #start-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; pointer-events:all; cursor:pointer;
    background:rgba(0,0,0,0.7); color:#fff; font-size:28px;
    letter-spacing:3px; z-index:100;
  }
  #start-overlay.hidden { display:none; }
  #start-overlay .sub { font-size:14px; color:rgba(255,255,255,0.6); margin-top:12px; }
  #game-over {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:none; align-items:center; justify-content:center;
    flex-direction:column; pointer-events:all; cursor:pointer;
    background:rgba(0,0,0,0.8); color:#fff; font-size:32px;
    letter-spacing:4px; z-index:101;
  }
  #game-over.show { display:flex; }
  #game-over .score { font-size:18px; color:#ff9800; margin-top:10px; }
  #game-over .restart { font-size:14px; color:rgba(255,255,255,0.5); margin-top:20px; }
  #respawn-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:none; align-items:center; justify-content:center;
    flex-direction:column; pointer-events:none;
    background:rgba(120,0,0,0.25); color:#fff; font-size:26px;
    letter-spacing:3px; z-index:99;
  }
  #respawn-overlay.show { display:flex; }
  #respawn-overlay .sub { font-size:14px; color:rgba(255,255,255,0.7); margin-top:12px; }
  #scope-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%; display:none;
    pointer-events:none; z-index:5;
    background: radial-gradient(circle at center, rgba(0,0,0,0) 38%, rgba(0,0,0,0.85) 62%);
  }
  #start-overlay .menu-title { font-size:34px; letter-spacing:6px; margin-bottom:14px; text-shadow:0 0 20px rgba(255,180,80,0.35); }
  #start-overlay .menu-sec { font-size:14px; color:rgba(255,255,255,0.55); margin:14px 0 8px; letter-spacing:3px; }
  #start-overlay .cards { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width:1080px; }
  #start-overlay .card {
    width:200px; padding:12px 14px; border:1px solid rgba(255,255,255,0.25);
    border-radius:8px; background:rgba(255,255,255,0.06); cursor:pointer;
    font-size:16px; line-height:1.4; transition:all .15s; text-align:left;
  }
  #start-overlay .card span { display:block; font-size:12px; color:rgba(255,255,255,0.6); margin-top:6px; letter-spacing:0; }
  #start-overlay .card:hover { background:rgba(255,255,255,0.12); }
  #start-overlay .card.sel { border-color:#ffb347; background:rgba(255,179,71,0.15); box-shadow:0 0 12px rgba(255,179,71,0.25); }
  #start-btn {
    margin-top:24px; padding:12px 46px; font-size:20px; letter-spacing:8px;
    border:1px solid #ffb347; border-radius:6px; color:#ffb347; cursor:pointer;
    background:rgba(255,179,71,0.08); transition:all .15s;
  }
  #start-btn:hover { background:rgba(255,179,71,0.25); color:#fff; }
  #pause-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.55); z-index:100; pointer-events:all;
  }
  #pause-overlay.show { display:flex; }
  .pause-box {
    background:rgba(20,22,26,0.92); border:1px solid rgba(255,255,255,0.15);
    border-radius:10px; padding:28px 40px; text-align:center; color:#fff;
  }
  .pause-title { font-size:22px; letter-spacing:4px; margin-bottom:8px; }
  .pause-sub { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:20px; }
  .pause-btns { display:flex; gap:14px; justify-content:center; }
  .pbtn {
    padding:10px 26px; border:1px solid rgba(255,255,255,0.35); border-radius:6px;
    cursor:pointer; font-size:15px; letter-spacing:2px; transition:all .15s;
  }
  .pbtn:hover { background:rgba(255,255,255,0.15); }
  .pbtn.warn { border-color:#ff7043; color:#ff9a76; }
  .pbtn.warn:hover { background:rgba(255,112,67,0.2); color:#fff; }
  #hp-num {
    position:absolute; bottom:52px; left:50%; transform:translateX(-50%);
    color:#fff; font-size:13px; text-shadow:0 0 4px rgba(0,0,0,0.8);
  }
  #streak-hint {
    position:absolute; bottom:72px; left:50%; transform:translateX(-50%);
    color:#ffd54f; font-size:14px; letter-spacing:2px;
    text-shadow:0 0 8px rgba(0,0,0,0.8); display:none;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="crosshair"></div>
  <div id="gun-marker"></div>
  <div id="vel-marker"></div>
  <div id="hitmark">命中</div>
  <div id="top-info">时间: <span id="match-time">5:00</span> &nbsp; 击毁: <span id="kill-count">0</span> &nbsp; 连杀: <span id="streak-val">0</span> &nbsp; 积分: <span id="score-val">0</span> &nbsp; 敌方: <span id="enemy-count">3</span> &nbsp; 队友: <span id="ally-count">2</span></div>
  <canvas id="minimap" width="130" height="130"></canvas>
  <div id="controls-hint">
    W/S 前进 · 后退<br>
    A/D 履带转向<br>
    鼠标 瞄准 | 左键 主炮<br>
    空格 同轴机枪 | 右键 狙击镜<br>
    B 歼轰-7 (3连杀奖励)<br>
    滚轮 缩放 | ESC 暂停
  </div>
  <div id="streak-hint"></div>
  <div id="hp-num">HP: <span id="hp-val">100</span>/<span id="hp-max">100</span></div>
  <div id="hp-bar"><div id="hp-fill"></div></div>
  <div id="reload-bar"><div id="reload-fill"></div></div>
</div>
<div id="damage-flash"></div>
<div id="scope-overlay"></div>
<div id="respawn-overlay">已被击毁<span class="sub">复活倒计时 <span id="respawn-timer">4</span> s</span></div>
<div id="pause-overlay">
  <div class="pause-box">
    <div class="pause-title">战斗暂停</div>
    <div class="pause-sub">对局仍在等待你, 是否返回主菜单?</div>
    <div class="pause-btns">
      <div class="pbtn" id="btn-resume">继续战斗</div>
      <div class="pbtn warn" id="btn-menu">返回菜单</div>
    </div>
  </div>
</div>
<div id="start-overlay">点击进入战斗<span class="sub">Click to enter battle</span></div>
<div id="game-over">
  <span id="go-title">战斗结束</span>
  <span class="score">击毁: <span id="go-kills">0</span> &nbsp; 死亡: <span id="go-deaths">0</span> &nbsp; 积分: <span id="go-points">0</span></span>
  <span class="restart">点击重新开始</span>
</div>

<script>
let SELECTED_TANK = 'medium', SELECTED_MAP = 'town';
const TANK_CLASSES = {
  medium:    { name: 'M-26 中型坦克', color: 0x6b8e23, hp: 110, dmg: [25, 40], reload: 2.2, maxFwd: 11,   maxRev: 6,   accel: 4.5, turn: 1.1,  shellSpeed: 150, scale: 1 },
  heavy:     { name: 'KV-2 重型坦克', color: 0x556b2f, hp: 170, dmg: [34, 52], reload: 3.4, maxFwd: 8,    maxRev: 4.5, accel: 3.2, turn: 0.8,  shellSpeed: 140, scale: 1.09 },
  destroyer: { name: '猎手 歼击车',   color: 0x71805e, hp: 85,  dmg: [40, 58], reload: 2.9, maxFwd: 12.5, maxRev: 7,   accel: 5.2, turn: 1.25, shellSpeed: 175, scale: 0.94 },
  ztz99a:    { name: 'ZTZ-99A 主战坦克', model: '99a',  color: 0x4a5a40, hp: 150, dmg: [42, 60], reload: 3.0, maxFwd: 13,   maxRev: 6.5, accel: 5.5, turn: 1.2,  shellSpeed: 190, scale: 1 },
  m1a2:      { name: 'M1A2 艾布拉姆斯', model: 'm1a2', color: 0xa8926b, hp: 165, dmg: [40, 58], reload: 3.3, maxFwd: 12.5, maxRev: 7,   accel: 5.0, turn: 1.15, shellSpeed: 185, scale: 1.02 }
};
function initGame() {
const MAP_KIND = SELECTED_MAP;
const PLAYER_CLASS = TANK_CLASSES[SELECTED_TANK];
// ==================== THREE.JS SETUP ====================
const scene = new THREE.Scene();
const skyCol = MAP_KIND === 'hills' ? 0x9db8c9 : 0x9aa3ac;
scene.background = new THREE.Color(skyCol);
scene.fog = new THREE.Fog(skyCol, MAP_KIND === 'hills' ? 380 : 260, MAP_KIND === 'hills' ? 1100 : 850);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 1500);
camera.position.set(0, 30, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ==================== LIGHTING ====================
const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
sunLight.position.set(80, 120, 60);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.left = -120; sunLight.shadow.camera.right = 120;
sunLight.shadow.camera.top = 120; sunLight.shadow.camera.bottom = -120;
sunLight.shadow.camera.near = 1; sunLight.shadow.camera.far = 400;
sunLight.shadow.bias = -0.0005;
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x6688aa, 0.6));
scene.add(new THREE.HemisphereLight(0x8899cc, 0x445522, 0.4));

// ==================== MAP BOUNDS ====================
const MAP_SIZE = 400, MAP_HALF = MAP_SIZE/2;

// ==================== TERRAIN (高度场 + 可行驶废墟) ====================
// 城镇建在高地上, 西侧有俯瞰山脊, 郊外为低洼田野
function terrainHeight(x, z) {
  if (MAP_KIND === 'hills') {
    return Math.sin(x * 0.012) * Math.cos(z * 0.010) * 6
         + Math.sin(x * 0.031 + 1.3) * Math.cos(z * 0.027 + 0.5) * 2.2
         + Math.sin((x + z) * 0.007 + 2.1) * 3.5;
  }
  const d2 = x*x + z*z;
  const hill = 8 * Math.exp(-d2 / (2 * 85 * 85));
  const ridge = 5 * Math.exp(-Math.pow(x + 155, 2) / (2 * 40 * 40));
  const rolling = Math.sin(x * 0.021) * Math.cos(z * 0.017) * 1.0
                + Math.sin((x - z) * 0.011 + 2.0) * 0.7;
  return hill + ridge + rolling;
}
// 可行驶的废墟土堆 (静态废墟 + 房屋倒塌后动态加入)
const rubbleMounds = [];
function rubbleHeight(x, z) {
  let h = 0;
  for (const m of rubbleMounds) {
    const dx = x - m.x, dz = z - m.z;
    const d2 = dx*dx + dz*dz;
    if (d2 < m.r * m.r) {
      const t = 1 - Math.sqrt(d2) / m.r;
      h += m.h * t * t * (3 - 2 * t);
    }
  }
  return h;
}
function groundHeight(x, z) { return terrainHeight(x, z) + rubbleHeight(x, z); }
function groundNormal(x, z) {
  const e = 1.2;
  const n = new THREE.Vector3(
    groundHeight(x - e, z) - groundHeight(x + e, z),
    2 * e,
    groundHeight(x, z - e) - groundHeight(x, z + e)
  );
  return n.normalize();
}
function rayGroundDist(origin, dir, maxDist) {
  for (let t = 2; t <= maxDist; t += 2) {
    if (origin.y + dir.y*t <= groundHeight(origin.x + dir.x*t, origin.z + dir.z*t)) {
      let lo = t - 2, hi = t;
      for (let i = 0; i < 6; i++) {
        const mid = (lo + hi) / 2;
        if (origin.y + dir.y*mid <= groundHeight(origin.x + dir.x*mid, origin.z + dir.z*mid)) hi = mid;
        else lo = mid;
      }
      return hi;
    }
  }
  return Infinity;
}
function terrainBlocksLine(x1, y1, z1, x2, y2, z2) {
  const dx = x2 - x1, dy = y2 - y1, dz = z2 - z1;
  const dist = Math.sqrt(dx*dx + dz*dz);
  const steps = Math.floor(dist / 5);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    if (groundHeight(x1 + dx*t, z1 + dz*t) > y1 + dy*t + 0.4) return true;
  }
  return false;
}
// 简单物理: 坦克贴地 + 沿坡面/废墟堆倾斜
const _alignM = new THREE.Matrix4();
const _alignQ = new THREE.Quaternion();
function alignTankToGround(tank, dt) {
  const p = tank.mesh.position;
  p.y = groundHeight(p.x, p.z);
  const up = groundNormal(p.x, p.z);
  const fwdFlat = new THREE.Vector3(Math.sin(tank.yaw), 0, Math.cos(tank.yaw));
  const right = new THREE.Vector3().crossVectors(up, fwdFlat).normalize();
  const fwd = new THREE.Vector3().crossVectors(right, up).normalize();
  _alignM.makeBasis(right, up, fwd);
  _alignQ.setFromRotationMatrix(_alignM);
  tank.mesh.quaternion.slerp(_alignQ, Math.min(1, dt * 8));
}

const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 120, 120);
groundGeo.rotateX(-Math.PI/2);
{
  const gpos = groundGeo.attributes.position;
  for (let i = 0; i < gpos.count; i++) {
    gpos.setY(i, terrainHeight(gpos.getX(i), gpos.getZ(i)));
  }
  groundGeo.computeVertexNormals();
}
// 城市地面贴图: 灰土废墟 + 街道网格 (与街区布局对齐)
const BLOCK = 46, STREET_W = 14;
const groundCanvas = document.createElement('canvas'); groundCanvas.width = 1024; groundCanvas.height = 1024;
const gctx = groundCanvas.getContext('2d');
const PXM = 1024 / MAP_SIZE;
if (MAP_KIND === 'town') {
gctx.fillStyle = '#6e675c'; gctx.fillRect(0, 0, 1024, 1024);
for (let i = 0; i < 9000; i++) {
  const x = Math.random()*1024, y = Math.random()*1024;
  const g = 90 + Math.random()*70;
  gctx.fillStyle = `rgba(${g},${Math.floor(g*0.95)},${Math.floor(g*0.85)},0.5)`;
  gctx.fillRect(x, y, 1+Math.random()*3, 1+Math.random()*3);
}
// 郊外田地色块 (城外街区)
for (let fbi = -4; fbi <= 3; fbi++) {
  for (let fbj = -4; fbj <= 3; fbj++) {
    const fcx = fbi*BLOCK + BLOCK/2, fcz = fbj*BLOCK + BLOCK/2;
    if (Math.sqrt(fcx*fcx + fcz*fcz) < 130) continue;
    gctx.fillStyle = `rgba(${100+Math.random()*30},${110+Math.random()*30},${60+Math.random()*20},0.4)`;
    gctx.fillRect(512 + (fcx-16)*PXM, 512 + (fcz-16)*PXM, 32*PXM, 32*PXM);
    if (Math.random() < 0.5) {
      gctx.strokeStyle = 'rgba(60,55,40,0.25)'; gctx.lineWidth = 1;
      for (let f = -14; f <= 14; f += 3) {
        gctx.beginPath();
        gctx.moveTo(512 + (fcx+f)*PXM, 512 + (fcz-15)*PXM);
        gctx.lineTo(512 + (fcx+f)*PXM, 512 + (fcz+15)*PXM);
        gctx.stroke();
      }
    }
  }
}
// 街道 (x=0/z=0 为加宽主干道)
gctx.fillStyle = '#4c4a47';
for (let k = -4; k <= 4; k++) {
  const c = 512 + k * BLOCK * PXM;
  const wpx = (k === 0 ? 18 : STREET_W) * PXM;
  gctx.fillRect(c - wpx/2, 0, wpx, 1024);
  gctx.fillRect(0, c - wpx/2, 1024, wpx);
}
// 中央广场石板 + 同心环
gctx.fillStyle = '#5d5b56';
gctx.beginPath(); gctx.arc(512, 512, 34 * PXM, 0, Math.PI*2); gctx.fill();
gctx.strokeStyle = 'rgba(70,68,64,0.8)'; gctx.lineWidth = 2;
for (let r = 8; r <= 32; r += 8) { gctx.beginPath(); gctx.arc(512, 512, r * PXM, 0, Math.PI*2); gctx.stroke(); }
gctx.fillStyle = 'rgba(140,135,128,0.25)';
for (let i = 0; i < 2500; i++) {
  gctx.fillRect(Math.random()*1024, Math.random()*1024, 1+Math.random()*2, 1+Math.random()*2);
}
} else {
// 丘陵旷野: 草地 + 泥土斑块
gctx.fillStyle = '#5d7a44'; gctx.fillRect(0, 0, 1024, 1024);
for (let i = 0; i < 11000; i++) {
  const g = 80 + Math.random()*70;
  gctx.fillStyle = `rgba(${Math.floor(g*0.75)},${Math.floor(g)},${Math.floor(g*0.5)},0.45)`;
  gctx.fillRect(Math.random()*1024, Math.random()*1024, 1+Math.random()*3, 1+Math.random()*3);
}
for (let i = 0; i < 40; i++) {
  gctx.fillStyle = `rgba(${110+Math.random()*30},${95+Math.random()*25},${60+Math.random()*20},0.3)`;
  const x = Math.random()*1024, y = Math.random()*1024, r = 20+Math.random()*60;
  gctx.beginPath(); gctx.ellipse(x, y, r, r*0.6, Math.random()*Math.PI, 0, Math.PI*2); gctx.fill();
}
}
const groundTex = new THREE.CanvasTexture(groundCanvas);
const groundMat = new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.receiveShadow = true; scene.add(ground);

// 无边界延伸地表: 战区外的大地一直延伸到雾际 (轰炸机可自由飞越)
{
  const skirtGeo = new THREE.PlaneGeometry(MAP_SIZE * 3, MAP_SIZE * 3, 96, 96);
  skirtGeo.rotateX(-Math.PI/2);
  const sp = skirtGeo.attributes.position;
  for (let i = 0; i < sp.count; i++) {
    sp.setY(i, terrainHeight(sp.getX(i), sp.getZ(i)) - 0.18);
  }
  skirtGeo.computeVertexNormals();
  const skirtMat = new THREE.MeshStandardMaterial({ color: MAP_KIND === 'hills' ? 0x5d7a44 : 0x6e675c, roughness: 0.95 });
  const skirt = new THREE.Mesh(skirtGeo, skirtMat);
  skirt.receiveShadow = true;
  scene.add(skirt);
}

// ==================== OBSTACLES (二战巷战废墟) ====================
const obstacles = [];
const ruinColors = [0x8a6f5c, 0x9c8b7a, 0xb0a08e, 0x7d7468, 0x94826f];

function addRubbleMound(x, z, r, h, color) {
  rubbleMounds.push({ x, z, r, h });
  const c = color || ruinColors[Math.floor(Math.random()*ruinColors.length)];
  const mat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.95 });
  const n = 5 + Math.floor(Math.random()*3);
  const y0 = terrainHeight(x, z);
  for (let i = 0; i < n; i++) {
    const bw = r * (0.35 + Math.random()*0.5);
    const bh = h * (0.5 + Math.random()*0.9);
    const geo = new THREE.BoxGeometry(bw, bh, bw * (0.6 + Math.random()*0.7));
    const m = new THREE.Mesh(geo, mat);
    const a = Math.random() * Math.PI * 2, rr = Math.random() * r * 0.55;
    m.position.set(x + Math.sin(a)*rr, y0 + bh*0.3, z + Math.cos(a)*rr);
    m.rotation.y = Math.random() * Math.PI;
    m.rotation.z = (Math.random()-0.5) * 0.25;
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  }
}

function addHouse(x, z, w, d, h, hpOv, colorOv) {
  const color = colorOv || ruinColors[Math.floor(Math.random()*ruinColors.length)];
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.85 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x6b4a3a, roughness: 0.9 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  body.position.y = h/2; body.castShadow = true; body.receiveShadow = true;
  group.add(body);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(w, d) * 0.72, h * 0.35, 4), roofMat);
  roof.position.y = h + h * 0.17;
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  group.add(roof);
  const y = terrainHeight(x, z);
  group.position.set(x, y - 0.3, z);
  scene.add(group);
  obstacles.push({ x, z, y: y - 0.3, hw: w/2, hd: d/2, height: h, type: 'house',
    hp: hpOv || (70 + Math.random()*50), destroyed: false, baseColor: color, mesh: group });
}

function addRuinWall(x, z, w, d, h) {

  top.castShadow = true;
  group.add(top);
  const y = terrainHeight(x, z);
  group.position.set(x, y - 0.2, z);
  scene.add(group);

function addBlockade(x, z, s) {

const PLAZA_R = 34, TOWN_R = 130;

function addStoneWall(x, z, w, d) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x8b8378, roughness: 0.95 });
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, 1.1, d), mat);

    hp: 25, destroyed: false, crushable: true, baseColor: 0x8b8378, mesh: m });
}

function addStoneWallLine(x1, z1, x2, z2) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx*dx + dz*dz);
  const segs = Math.max(1, Math.round(len / 7));
  for (let i = 0; i < segs; i++) {
    if (Math.random() < 0.12) continue;
    const t = (i + 0.5) / segs;
    const sx = x1 + dx*t, sz = z1 + dz*t;
    addStoneWall(sx, sz, Math.abs(dx) > 0.1 ? len/segs - 0.5 : 0.55, Math.abs(dz) > 0.1 ? len/segs - 0.5 : 0.55);
  }
}

function addSandbag(x, z, alongX) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x7d7154, roughness: 1.0 });
  const w = alongX ? 2.6 : 0.9, d = alongX ? 0.9 : 2.6;

    row.position.y = 0.21 + i * 0.4;

function fillTownBlock(cx, cz, inner) {
  const edges = [
    { dx: 0, dz: -1 }, { dx: 0, dz: 1 }, { dx: -1, dz: 0 }, { dx: 1, dz: 0 }
  ];
  for (const e of edges) {
    let cursor = -inner + 1;
    while (cursor < inner - 7) {
      const w = 6.5 + Math.random() * 5;
      if (cursor + w > inner - 1) break;
      const depth = 5.5 + Math.random() * 2.5;
      const along = cursor + w / 2;
      const px = e.dx === 0 ? cx + along : cx + e.dx * (inner - depth/2);
      const pz = e.dx === 0 ? cz + e.dz * (inner - depth/2) : cz + along;
      const bw = e.dx === 0 ? w : depth;
      const bd = e.dx === 0 ? depth : w;
      if (Math.sqrt(px*px + pz*pz) > PLAZA_R + 4) {
        const r = Math.random();
        if (r < 0.55) {
          addHouse(px, pz, bw, bd, 4.5 + Math.random() * 4.5);
        } else if (r < 0.8) {
          addRuinWall(px, pz, e.dx === 0 ? bw : 0.6, e.dx === 0 ? 0.6 : bd, 2 + Math.random() * 3);
          addRubbleMound(px, pz, Math.max(bw, bd) * 0.55, 0.6 + Math.random() * 0.5);
        }
      }
      cursor += w + 1.2 + Math.random() * 2.5;
    }
  }
  if (Math.random() < 0.45) {
    addRubbleMound(cx + (Math.random()-0.5)*8, cz + (Math.random()-0.5)*8, 2.5 + Math.random()*2, 0.5 + Math.random()*0.4);
  }
}

function fillFieldBlock(cx, cz, inner) {
  const skip = Math.floor(Math.random() * 4);
  const sides = [
    [cx - inner, cz - inner, cx + inner, cz - inner],
    [cx - inner, cz + inner, cx + inner, cz + inner],
    [cx - inner, cz - inner, cx - inner, cz + inner],
    [cx + inner, cz - inner, cx + inner, cz + inner]
  ];
  for (let i = 0; i < 4; i++) {
    if (i === skip || Math.random() < 0.25) continue;
    addStoneWallLine(sides[i][0], sides[i][1], sides[i][2], sides[i][3]);
  }
  const r = Math.random();
  if (r < 0.3) {
    addHouse(cx + (Math.random()-0.5)*10, cz + (Math.random()-0.5)*10, 8 + Math.random()*4, 6 + Math.random()*3, 4.5 + Math.random()*2, 60 + Math.random()*30);
  } else if (r < 0.55) {
    addRubbleMound(cx + (Math.random()-0.5)*8, cz + (Math.random()-0.5)*8, 3.5 + Math.random()*2, 0.5 + Math.random()*0.4);
  }
}

// ==================== NAV GRID + A* 寻路 ====================
const NAV_CELL = 4, NAV_N = Math.floor(MAP_SIZE / NAV_CELL);
const navWalk = new Uint8Array(NAV_N * NAV_N);
function worldToCell(v) { return Math.max(0, Math.min(NAV_N - 1, Math.floor((v + MAP_HALF) / NAV_CELL))); }
function cellCenter(c) { return -MAP_HALF + c * NAV_CELL + NAV_CELL / 2; }
function computeNavCell(cx, cz) {
  navWalk[cz * NAV_N + cx] = checkWorldCollision(cellCenter(cx), cellCenter(cz), 3.3) ? 0 : 1;
}
function buildNavGrid() {
  for (let cz = 0; cz < NAV_N; cz++)
    for (let cx = 0; cx < NAV_N; cx++) computeNavCell(cx, cz);
}
function updateNavAround(ob) {
  const r = (ob.hw !== undefined ? Math.max(ob.hw, ob.hd) : (ob.radius || 2)) + 5;
  const x0 = worldToCell(ob.x - r), x1 = worldToCell(ob.x + r);
  const z0 = worldToCell(ob.z - r), z1 = worldToCell(ob.z + r);
  for (let cz = z0; cz <= z1; cz++)
    for (let cx = x0; cx <= x1; cx++) computeNavCell(cx, cz);
}

const navG = new Float32Array(NAV_N * NAV_N);
const navF = new Float32Array(NAV_N * NAV_N);
const navCame = new Int32Array(NAV_N * NAV_N);
const navSeen = new Int32Array(NAV_N * NAV_N);
const navClosed = new Int32Array(NAV_N * NAV_N);
let navStamp = 0;
const heapArr = new Int32Array(40000);
let navPlansThisFrame = 0;

function navNearestWalkable(cx, cz) {
  if (navWalk[cz * NAV_N + cx]) return cz * NAV_N + cx;
  for (let r = 1; r <= 5; r++) {
    for (let dz = -r; dz <= r; dz++) {
      for (let dx = -r; dx <= r; dx++) {
        if (Math.max(Math.abs(dx), Math.abs(dz)) !== r) continue;
        const nx = cx + dx, nz = cz + dz;
        if (nx < 0 || nz < 0 || nx >= NAV_N || nz >= NAV_N) continue;
        if (navWalk[nz * NAV_N + nx]) return nz * NAV_N + nx;
      }
    }
  }
  return -1;
}

function navLineWalkable(x0, z0, x1, z1) {
  const dx = x1 - x0, dz = z1 - z0;
  const dist = Math.sqrt(dx*dx + dz*dz);
  const steps = Math.ceil(dist / (NAV_CELL * 0.5));
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    if (!navWalk[worldToCell(z0 + dz*t) * NAV_N + worldToCell(x0 + dx*t)]) return false;
  }
  return true;
}

function smoothPath(pts) {
  if (pts.length <= 2) return pts;
  const out = [pts[0]];
  let i = 0;
  while (i < pts.length - 1) {
    let j = pts.length - 1;
    while (j > i + 1 && !navLineWalkable(pts[i].x, pts[i].z, pts[j].x, pts[j].z)) j--;
    out.push(pts[j]);
    i = j;
  }
  return out;
}

function navFindPath(sx, sz, gx, gz) {
  navStamp++;
  const startI = navNearestWalkable(worldToCell(sx), worldToCell(sz));
  const goalI = navNearestWalkable(worldToCell(gx), worldToCell(gz));
  if (startI < 0 || goalI < 0) return null;
  const gcx = goalI % NAV_N, gcz = Math.floor(goalI / NAV_N);
  let heapN = 0;
  function heapPush(i) {
    if (heapN >= heapArr.length - 1) return;
    let k = heapN++;
    heapArr[k] = i;
    while (k > 0) {
      const p = (k - 1) >> 1;
      if (navF[heapArr[p]] <= navF[heapArr[k]]) break;
      const t = heapArr[p]; heapArr[p] = heapArr[k]; heapArr[k] = t;
      k = p;
    }
  }
  function heapPop() {
    const top = heapArr[0];
    heapN--;
    if (heapN > 0) {
      heapArr[0] = heapArr[heapN];
      let k = 0;
      while (true) {
        const l = k*2+1, r = l+1;
        let m = k;
        if (l < heapN && navF[heapArr[l]] < navF[heapArr[m]]) m = l;
        if (r < heapN && navF[heapArr[r]] < navF[heapArr[m]]) m = r;
        if (m === k) break;
        const t = heapArr[m]; heapArr[m] = heapArr[k]; heapArr[k] = t;
        k = m;
      }
    }
    return top;
  }
  navG[startI] = 0;
  navF[startI] = Math.hypot((startI % NAV_N) - gcx, Math.floor(startI / NAV_N) - gcz);
  navSeen[startI] = navStamp;
  navCame[startI] = -1;
  heapPush(startI);
  let expand = 0, found = false;
  while (heapN > 0 && expand < 3500) {
    const cur = heapPop();
    if (navClosed[cur] === navStamp) continue;
    navClosed[cur] = navStamp;
    if (cur === goalI) { found = true; break; }
    expand++;
    const ccx = cur % NAV_N, ccz = Math.floor(cur / NAV_N);
    for (let dz = -1; dz <= 1; dz++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dz === 0) continue;
        const nx = ccx + dx, nz = ccz + dz;
        if (nx < 0 || nz < 0 || nx >= NAV_N || nz >= NAV_N) continue;
        const ni = nz * NAV_N + nx;
        if (!navWalk[ni] || navClosed[ni] === navStamp) continue;
        if (dx !== 0 && dz !== 0) {
          if (!navWalk[ccz * NAV_N + nx] || !navWalk[nz * NAV_N + ccx]) continue;
        }
        const ng = navG[cur] + ((dx === 0 || dz === 0) ? 1 : 1.4142);
        if (navSeen[ni] !== navStamp || ng < navG[ni]) {
          navSeen[ni] = navStamp;
          navG[ni] = ng;
          navF[ni] = ng + Math.hypot(nx - gcx, nz - gcz);
          navCame[ni] = cur;
          heapPush(ni);
        }
      }
    }
  }
  if (!found) return null;
  const pts = [];
  let cur = goalI;
  while (cur >= 0) {
    pts.push({ x: cellCenter(cur % NAV_N), z: cellCenter(Math.floor(cur / NAV_N)) });
    cur = navCame[cur];
  }
  pts.reverse();
  return smoothPath(pts);
}
buildNavGrid();

// ==================== TANK CREATION (超精度模型) ====================
const TRACK_R = 0.31, TRACK_RUN = 4.6, TRACK_LEN = TRACK_RUN * 2 + Math.PI * 2 * TRACK_R;
const TRACK_LINKS = 32;
const _dummy = new THREE.Object3D();

function trackPose(s) {
  if (s < TRACK_RUN) return { z: 2.3 - s, y: 0.22, rot: 0 };
  s -= TRACK_RUN;
  const arc = Math.PI * TRACK_R;
  if (s < arc) { const a = s / TRACK_R; return { z: -2.3 - TRACK_R*Math.sin(a), y: 0.53 - TRACK_R*Math.cos(a), rot: a }; }
  s -= arc;
  if (s < TRACK_RUN) return { z: -2.3 + s, y: 0.84, rot: 0 };
  s -= TRACK_RUN;
  const a = s / TRACK_R;
  return { z: 2.3 + TRACK_R*Math.sin(a), y: 0.53 + TRACK_R*Math.cos(a), rot: a };
}

function updateWheelInstances(tank) {
  const meta = tank.wheelMeta || { count: 5, z0: -1.7, spacing: 0.85, y: 0.4 };
  let i = 0;
  for (const sx of [-1.62, 1.62]) {
    for (let k = 0; k < meta.count; k++) {
      _dummy.position.set(sx, meta.y, meta.z0 + k * meta.spacing);
      _dummy.rotation.set(tank.wheelAngle, 0, 0);
      _dummy.updateMatrix();
      tank.rubberInst.setMatrixAt(i, _dummy.matrix);
      tank.discInst.setMatrixAt(i, _dummy.matrix);
      i++;
    }
  }
  tank.rubberInst.instanceMatrix.needsUpdate = true;
  tank.discInst.instanceMatrix.needsUpdate = true;
}

function updateTrackInstances(tank) {
  const spacing = TRACK_LEN / TRACK_LINKS;
  let idx = 0;
  for (const sx of [-1.62, 1.62]) {
    for (let k = 0; k < TRACK_LINKS; k++) {
      const p = trackPose((k * spacing + tank.trackOffset) % TRACK_LEN);
      _dummy.position.set(sx, p.y, p.z);
      _dummy.rotation.set(p.rot, 0, 0);
      _dummy.updateMatrix();
      tank.trackInst.setMatrixAt(idx++, _dummy.matrix);
    }
  }
  tank.trackInst.instanceMatrix.needsUpdate = true;
}

// 程序化迷彩贴图
function makeCamoTexture(baseHex) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const base = new THREE.Color(baseHex);
  ctx.fillStyle = '#' + base.getHexString(); ctx.fillRect(0, 0, 128, 128);
  const tones = [
    base.clone().multiplyScalar(0.72),
    base.clone().lerp(new THREE.Color(0x5a4632), 0.5),
    base.clone().lerp(new THREE.Color(0xffffff), 0.1)
  ];
  for (let ti = 0; ti < tones.length; ti++) {
    ctx.fillStyle = '#' + tones[ti].getHexString();
    const blobs = ti === 2 ? 6 : 11;
    for (let i = 0; i < blobs; i++) {
      const x = Math.random()*128, y = Math.random()*128, r = 8 + Math.random()*16;
      ctx.beginPath();
      ctx.ellipse(x, y, r, r*(0.5+Math.random()*0.7), Math.random()*Math.PI, 0, Math.PI*2);
      ctx.fill();
    }
  }
  for (let i = 0; i < 400; i++) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.08})`;
    ctx.fillRect(Math.random()*128, Math.random()*128, 1+Math.random()*2, 1+Math.random()*2);
  }
  return new THREE.CanvasTexture(c);
}

// 通用部件挂载 + 现代坦克行走机构 (可配置负重轮数)
function addPart(parent, geo, mat, x, y, z, rx, ry, rz, noShadow) {
  const m = new THREE.Mesh(geo, mat);

function buildRunningGear(g, opts) {
  const meta = Object.assign({ count: 5, z0: -1.7, spacing: 0.85, y: 0.4 }, opts || {});
  const rubberMat = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.95 });
  const steelMat = new THREE.MeshStandardMaterial({ color: 0x555550, roughness: 0.5, metalness: 0.5 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x1e1e1e, roughness: 0.9 });
  const rubberGeo = new THREE.CylinderGeometry(0.33, 0.33, 0.18, 14); rubberGeo.rotateZ(Math.PI/2);
  const discGeo = new THREE.CylinderGeometry(0.23, 0.23, 0.2, 10); discGeo.rotateZ(Math.PI/2);
  const rubberInst = new THREE.InstancedMesh(rubberGeo, rubberMat, meta.count * 2);
  const discInst = new THREE.InstancedMesh(discGeo, steelMat, meta.count * 2);
  g.add(rubberInst);
  g.add(discInst);
  const linkGeo = new THREE.BoxGeometry(0.62, 0.07, 0.28);
  const trackInst = new THREE.InstancedMesh(linkGeo, darkMat, TRACK_LINKS * 2);
  trackInst.castShadow = true;
  g.add(trackInst);
  const wheels = [];
  const idlerGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.16, 10); idlerGeo.rotateZ(Math.PI/2);
  for (const sx of [-1.62, 1.62]) {
    wheels.push(addPart(g, idlerGeo, steelMat, sx, 0.5, 2.45, 0, 0, 0, true));
    wheels.push(addPart(g, idlerGeo, steelMat, sx, 0.5, -2.45, 0, 0, 0, true));
  }
  return { meta, wheels, rubberInst, discInst, trackInst };
}

function spinWheels(tank, dt) {
  if (!tank.trackInst || Math.abs(tank.speed) < 0.01) return;
  tank.wheelAngle += tank.speed * dt / 0.34;
  tank.trackOffset = ((tank.trackOffset + tank.speed * dt) % TRACK_LEN + TRACK_LEN) % TRACK_LEN;
  for (const wh of tank.wheels) wh.rotation.x = tank.wheelAngle;
  updateWheelInstances(tank);
  updateTrackInstances(tank);
}

function spawnEnemy() {
  let ex, ez, valid;
  const margin = 30;
  do {
    ex = -MAP_HALF + margin + Math.random()*(MAP_SIZE - margin*2);
    ez = -MAP_HALF + margin + Math.random()*(MAP_SIZE - margin*2);
    const dx = ex - player.mesh.position.x, dz = ez - player.mesh.position.z;
    const dp = Math.sqrt(dx*dx+dz*dz);
    valid = dp > 120 && dp < 260;
    for (const ob of obstacles) {
      const odx = ex - ob.x, odz = ez - ob.z;
      if (Math.sqrt(odx*odx+odz*odz) < obstacleDriveRadius(ob) + 5) { valid = false; break; }
    }
    for (const en of enemies) {
      const edx = ex - en.mesh.position.x, edz = ez - en.mesh.position.z;
      if (Math.sqrt(edx*edx+edz*edz) < 12) { valid = false; break; }
    }
  } while (!valid);
  const enemy = createTank(0x8B2500);
  enemy.yaw = Math.random() * Math.PI*2;
  enemy.mesh.position.set(ex, groundHeight(ex, ez), ez);
  enemy.mesh.rotation.y = enemy.yaw;
  enemy.isEnemy = true;
  enemy.team = 'red';
  initAIFields(enemy);
  scene.add(enemy.mesh);
  enemies.push(enemy);
  return enemy;
}
for (let i = 0; i < 3; i++) spawnEnemy();

function spawnAlly() {
  let ax = 0, az = 0, valid = false, tries = 0;
  do {
    const ang = Math.random() * Math.PI * 2;
    const r = 18 + Math.random() * 30;
    ax = player.mesh.position.x + Math.sin(ang) * r;
    az = player.mesh.position.z + Math.cos(ang) * r;
    valid = ax > -MAP_HALF+15 && ax < MAP_HALF-15 && az > -MAP_HALF+15 && az < MAP_HALF-15 && !checkWorldCollision(ax, az, 4);
    if (valid) {
      for (const en of enemies) {
        if (!en.alive) continue;
        const ddx = ax - en.mesh.position.x, ddz = az - en.mesh.position.z;
        if (Math.sqrt(ddx*ddx+ddz*ddz) < 80) { valid = false; break; }
      }
    }
    tries++;
  } while (!valid && tries < 100);
  const ally = createTank(0x3a6ea5);
  ally.yaw = player.yaw;
  ally.mesh.position.set(ax, groundHeight(ax, az), az);
  ally.mesh.rotation.y = ally.yaw;
  ally.isEnemy = false;
  ally.team = 'green';
  initAIFields(ally);
  scene.add(ally.mesh);
  allies.push(ally);
  return ally;
}

function fireMG() {
  player.mgCool = 0.13;

  const dir = new THREE.Vector3();
  player.barrelPivot.getWorldDirection(dir);
  muzzlePos.addScaledVector(dir, 3.2);
  muzzlePos.y -= 0.25;
  dir.x += (Math.random()-0.5)*0.012;
  dir.y += (Math.random()-0.5)*0.012;
  dir.z += (Math.random()-0.5)*0.012;
  dir.normalize();
  const b = new THREE.Mesh(mgGeo, mgMat);
  b.position.copy(muzzlePos);
  scene.add(b);
  mgBullets.push({ mesh: b, vel: dir.multiplyScalar(300), life: 0.8 });
  playNoise(0.04, 0.12, 1400);
}

function updateMG(dt) {
  for (let i = mgBullets.length-1; i >= 0; i--) {
    const b = mgBullets[i];
    b.vel.y -= 2 * dt;
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;
    let hit = false;
    if (b.mesh.position.y <= groundHeight(b.mesh.position.x, b.mesh.position.z) + 0.05) hit = true;
    if (!hit && shellHitsObstacle(b.mesh.position, 0.1)) hit = true;
    if (!hit) {
      for (const tank of [...enemies, ...allies]) {
        if (!tank.alive) continue;
        const tp = tank.mesh.position;
        const dx = b.mesh.position.x - tp.x, dz = b.mesh.position.z - tp.z;
        const dy = b.mesh.position.y - tp.y;
        if (dx*dx + dz*dz < 7.3 && Math.abs(dy) < 3) {
          damageTank(tank, 1 + Math.random()*1.5, player);
          hit = true; break;
        }
      }
    }
    if (hit || b.life <= 0) {
      if (hit) spawnParticles(b.mesh.position, 1, 0xffcc66, 0.2, 2.5);
      scene.remove(b.mesh);
      mgBullets.splice(i, 1);
    }
  }
}

  pp(new THREE.BoxGeometry(0.04, 0.18, 0.28), navyMat, 0, 0.74, -1.4, 0, 0, 0, true);
  return { mesh: g, props: [], yaw: 0, pitch: 0, roll: 0, speed: 62, targetSpeed: 62, hp: 60, alive: true, team: 'green', isPlane: true };
}

// 精细炸弹模型 (弹体+引信环带+尾锥+十字尾翼+加强环)
function createBombMesh() {
  const g = new THREE.Group();
  const bodyM = new THREE.MeshStandardMaterial({ color: 0x3d4536, roughness: 0.5, metalness: 0.4 });
  const finM = new THREE.MeshStandardMaterial({ color: 0x2a2f26, roughness: 0.6, metalness: 0.3 });
  const brassM = new THREE.MeshStandardMaterial({ color: 0xd8b93c, roughness: 0.4, metalness: 0.6 });
  const bd = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 0.85, 10), bodyM);
  bd.castShadow = true;
  g.add(bd);
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.26, 10, 8), bodyM);
  nose.position.y = -0.42; nose.scale.y = 1.25;
  g.add(nose);
  const band = new THREE.Mesh(new THREE.CylinderGeometry(0.235, 0.235, 0.08, 10), brassM);
  band.position.y = -0.2;
  g.add(band);
  const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 0.45, 10), bodyM);
  tail.position.y = 0.6;
  g.add(tail);
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2;
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.42, 0.16), finM);
    f.position.set(Math.sin(a) * 0.12, 0.72, Math.cos(a) * 0.12);
    f.rotation.y = a;
    g.add(f);
  }
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.022, 6, 14), finM);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.86;
  g.add(ring);
  return g;
}
const _bombAxis = new THREE.Vector3(0, -1, 0);
const _bombVn = new THREE.Vector3();

function callBomber() {
  bomberReady = false;
  streak = 0;
  sniperMode = false;
  bomberActive = true;
  bombsLeft = 6; bombCool = 0; planeMgCool = 0;
  bomber = createBomber();
  const px = player.mesh.position.x, pz = player.mesh.position.z;
  bomber.yaw = cameraYaw;
  bomber.pitch = 0;
  bomber.mesh.position.set(
    px - Math.sin(cameraYaw) * 170,
    Math.max(groundHeight(px, pz) + 65, 70),
    pz - Math.cos(cameraYaw) * 170
  );
  scene.add(bomber.mesh);
  playNoise(0.6, 0.3, 300);
}

function exitBomber(destroyed) {
  if (!bomberActive) return;
  bomberActive = false;
  if (bomber && bomber.mesh) scene.remove(bomber.mesh);
  bomber = null;
  bombCamMode = 0;
  bombCamBomb = null;
  invulnTimer = 1.5;
  cameraPitch = Math.max(-0.25, Math.min(1.1, cameraPitch));
}

function crashBomber() {
  if (!bomber) return;
  const m = bomber.mesh;
  const p = m.position;
  const gy = groundHeight(p.x, p.z);
  const cp = Math.cos(bomber.pitch);
  const vel = new THREE.Vector3(
    Math.sin(bomber.yaw) * cp * bomber.speed,
    Math.sin(bomber.pitch) * bomber.speed,
    Math.cos(bomber.yaw) * cp * bomber.speed
  );
  // 已贴地/撞楼: 当场爆炸
  if (p.y <= gy + 3 || shellHitsObstacle(p, 1.6)) {
    bombExplode(p.clone());
    exitBomber(true);
    return;
  }
  // 空中被击落: 机体保留, 转入拖烟坠落
  bomber.mesh = null;
  exitBomber(true);
  fallingPlanes.push({
    mesh: m,
    vel,
    spinY: (Math.random() - 0.5) * 1.6,
    rollV: (Math.random() < 0.5 ? -1 : 1) * (1.2 + Math.random()),
    pitchV: -0.35 - Math.random() * 0.4,
    smokeT: 0
  });
  spawnFireball(p.clone(), 4);
  playNoise(0.3, 0.4, 200);
}

// ==================== 固定翼 AI 托管 (爬升-寻敌-俯冲攻击-拉起) ====================
function convertToAIPlane() {
  if (!bomber) { exitBomber(false); return; }
  const m = bomber.mesh;
  const ai = {
    mesh: m, yaw: bomber.yaw, pitch: bomber.pitch, roll: bomber.roll || 0,
    speed: bomber.speed, targetSpeed: 70,
    hp: bomber.hp, bombs: 4, mgCool: 0, bombCool: 0,
    state: 'climb', target: null, scanT: 0
  };
  bomber.mesh = null;
  exitBomber(false);
  aiPlanes.push(ai);
}

function predictBombImpact(p) {
  let x = p.mesh.position.x, y = p.mesh.position.y - 1.4, z = p.mesh.position.z;
  const cp = Math.cos(p.pitch);
  let vx = Math.sin(p.yaw)*cp*p.speed, vy = Math.sin(p.pitch)*p.speed, vz = Math.cos(p.yaw)*cp*p.speed;
  for (let i = 0; i < 240; i++) {
    vy -= 12 * 0.05;
    x += vx * 0.05; y += vy * 0.05; z += vz * 0.05;
    if (y <= groundHeight(x, z)) return { x, z };
  }
  return null;
}

function aiPlaneDrop(p) {
  const cp = Math.cos(p.pitch);
  const vel = new THREE.Vector3(Math.sin(p.yaw)*cp*p.speed, Math.sin(p.pitch)*p.speed, Math.cos(p.yaw)*cp*p.speed);
  const m = createBombMesh();
  m.position.copy(p.mesh.position);
  m.position.y -= 1.4;
  scene.add(m);
  bombs.push({ mesh: m, vel });
  playNoise(0.1, 0.15, 500);
}

function aiPlaneMG(p) {
  const cp = Math.cos(p.pitch);
  const dir = new THREE.Vector3(Math.sin(p.yaw)*cp, Math.sin(p.pitch), Math.cos(p.yaw)*cp);
  dir.x += (Math.random()-0.5)*0.03; dir.y += (Math.random()-0.5)*0.03; dir.z += (Math.random()-0.5)*0.03;
  dir.normalize();
  const b = new THREE.Mesh(mgGeo, mgMat);
  b.position.copy(p.mesh.position).addScaledVector(dir, 5.5);
  b.position.y -= 0.4;
  scene.add(b);
  mgBullets.push({ mesh: b, vel: dir.multiplyScalar(320), life: 1.6 });
  playNoise(0.04, 0.09, 1300);
}

function updateAIPlanes(dt) {
  for (let i = aiPlanes.length - 1; i >= 0; i--) {
    const p = aiPlanes[i];
    const m = p.mesh;
    if (p.target && !p.target.alive) p.target = null;

    let desYaw = p.yaw, desPitch = 0.3, desSpeed = 70;

    if (p.state === 'climb') {
      // 爬升脱离
      desPitch = 0.42; desSpeed = 62;
      if (m.position.y > 88) p.state = p.bombs > 0 ? 'search' : 'leave';
    } else if (p.state === 'search') {
      // 高空巡航寻敌
      desPitch = Math.max(-0.1, Math.min(0.25, (92 - m.position.y) * 0.02));
      p.scanT -= dt;
      if (!p.target && p.scanT <= 0) {
        p.scanT = 0.5;
        let best = null, bd = Infinity;
        for (const e of enemies) {
          if (!e.alive) continue;
          const d = Math.hypot(e.mesh.position.x - m.position.x, e.mesh.position.z - m.position.z);
          if (d < bd) { bd = d; best = e; }
        }
        p.target = best;
      }
      if (p.target) {
        const tp = p.target.mesh.position;
        const hd = Math.hypot(tp.x - m.position.x, tp.z - m.position.z);
        desYaw = Math.atan2(tp.x - m.position.x, tp.z - m.position.z);
        if (hd < 260 && hd > 60) p.state = 'dive';
        else if (hd <= 60) desYaw += 1.2;   // 太近先盘旋拉开再进入
      } else {
        desYaw = p.yaw + 0.25;
        if (enemies.filter(e => e.alive).length === 0) p.state = 'leave';
      }
    } else if (p.state === 'dive') {
      if (!p.target) {
        p.state = 'climb';
      } else {
        // 俯冲攻击: 带提前量指向目标
        const tp = p.target.mesh.position;
        const dx = tp.x - m.position.x, dz = tp.z - m.position.z;
        const hd = Math.hypot(dx, dz);
        const tt = hd / Math.max(p.speed, 30);
        const lx = tp.x + Math.sin(p.target.yaw || 0) * (p.target.speed || 0) * tt * 0.7;
        const lz = tp.z + Math.cos(p.target.yaw || 0) * (p.target.speed || 0) * tt * 0.7;
        const ly = groundHeight(lx, lz) + 1.5;
        const lhd = Math.hypot(lx - m.position.x, lz - m.position.z) || 1;
        desYaw = Math.atan2(lx - m.position.x, lz - m.position.z);
        desPitch = Math.max(-1.1, Math.atan2(ly - m.position.y, lhd));
        desSpeed = 92;
        const yawErr = Math.abs(normalizeAngle(desYaw - p.yaw));
        // 航向对正后机枪扫射
        p.mgCool -= dt;
        if (yawErr < 0.08 && hd < 230 && p.mgCool <= 0) {
          p.mgCool = 0.12;
          aiPlaneMG(p);
        }
        // 弹道计算投弹: 预测落点足够接近目标才释放
        p.bombCool -= dt;
        if (p.bombs > 0 && p.bombCool <= 0 && hd < 150) {
          const impact = predictBombImpact(p);
          if (impact && Math.hypot(impact.x - tp.x, impact.z - tp.z) < 9) {
            p.bombCool = 0.55;
            p.bombs--;
            aiPlaneDrop(p);
          }
        }
        // 拉起条件: 高度过低或已冲过目标
        const alt = m.position.y - groundHeight(m.position.x, m.position.z);
        if (alt < 26 || (hd < 18 && alt < 50)) {
          p.state = 'climb';
          p.target = null;
        }
      }
    } else if (p.state === 'leave') {
      // 任务完成: 飞离战场
      desPitch = 0.15; desSpeed = 95;
      desYaw = Math.atan2(m.position.x || 0.01, m.position.z || 0.01);
      if (Math.abs(m.position.x) > MAP_HALF + 320 || Math.abs(m.position.z) > MAP_HALF + 320) {
        scene.remove(m);
        aiPlanes.splice(i, 1);
        continue;
      }
    }

    // ---- 飞行执行 ----
    const yawDiff = normalizeAngle(desYaw - p.yaw);
    const yr = (0.55 + 18 / Math.max(p.speed, 20)) * dt;
    p.yaw += Math.max(-yr, Math.min(yr, yawDiff));
    const pr = 1.1 * dt;
    p.pitch += Math.max(-pr, Math.min(pr, desPitch - p.pitch));
    p.targetSpeed = moveToward(p.targetSpeed, desSpeed, 30 * dt);
    p.speed += ((p.targetSpeed - p.speed) * 0.7 - Math.sin(p.pitch) * 8) * dt;
    p.speed = Math.max(24, Math.min(120, p.speed));
    const cp = Math.cos(p.pitch);
    m.position.x += Math.sin(p.yaw) * cp * p.speed * dt;
    m.position.y += Math.sin(p.pitch) * p.speed * dt;
    m.position.z += Math.cos(p.yaw) * cp * p.speed * dt;
    if (m.position.y > 130) { m.position.y = 130; if (p.pitch > 0) p.pitch *= 0.9; }
    p.roll += (Math.max(-1.2, Math.min(1.2, -yawDiff * 2.0)) - p.roll) * Math.min(1, dt * 4);
    m.rotation.y = p.yaw;
    m.rotation.x = -p.pitch;
    m.rotation.z = p.roll;

    // 坠地/撞楼
    if (m.position.y <= groundHeight(m.position.x, m.position.z) + 2 || shellHitsObstacle(m.position, 1.5)) {
      scene.remove(m);
      aiPlanes.splice(i, 1);
      bombExplode(m.position.clone());
      continue;
    }
    // 被击落 → 拖烟坠落
    if (p.hp <= 0) {
      const cpv = Math.cos(p.pitch);
      fallingPlanes.push({
        mesh: m,
        vel: new THREE.Vector3(Math.sin(p.yaw)*cpv*p.speed, Math.sin(p.pitch)*p.speed, Math.cos(p.yaw)*cpv*p.speed),
        spinY: (Math.random()-0.5)*1.6,
        rollV: (Math.random()<0.5?-1:1)*(1.2+Math.random()),
        pitchV: -0.4 - Math.random()*0.4,
        smokeT: 0
      });
      spawnFireball(m.position.clone(), 4);
      aiPlanes.splice(i, 1);
    }
  }
}

// 被击落的机体: 惯性坠落 + 拖烟起火, 触地引发与炸弹同级的爆炸
function updateFallingPlanes(dt) {
  for (let i = fallingPlanes.length - 1; i >= 0; i--) {
    const f = fallingPlanes[i];
    f.vel.y -= 14 * dt;
    f.vel.x *= (1 - 0.12 * dt);
    f.vel.z *= (1 - 0.12 * dt);
    f.mesh.position.addScaledVector(f.vel, dt);
    f.mesh.rotation.y += f.spinY * dt;
    f.mesh.rotation.z += f.rollV * dt;
    f.mesh.rotation.x += f.pitchV * dt;
    f.smokeT -= dt;
    if (f.smokeT <= 0) {
      f.smokeT = 0.06;
      spawnSmoke(f.mesh.position.clone(), 1);
      if (Math.random() < 0.5) spawnParticles(f.mesh.position, 1, 0xff7733, 0.4, 3);
    }
    const p = f.mesh.position;
    if (p.y <= groundHeight(p.x, p.z) + 1.2 || shellHitsObstacle(p, 1.5)) {
      scene.remove(f.mesh);
      fallingPlanes.splice(i, 1);
      bombExplode(p.clone());
    }
  }
}

function dropBomb() {

// ---- 地面防空火力 (空战对抗) ----
const aaBullets = [];
const aaMat = new THREE.MeshBasicMaterial({ color: 0xff8855 });
function fireAA(t, plane) {
  const from = new THREE.Vector3(t.mesh.position.x, t.mesh.position.y + 2.6, t.mesh.position.z);
  const bp = plane.mesh.position;
  const cpb = Math.cos(plane.pitch);
  const bv = new THREE.Vector3(Math.sin(plane.yaw)*cpb, Math.sin(plane.pitch), Math.cos(plane.yaw)*cpb).multiplyScalar(plane.speed);
  const ft = from.distanceTo(bp) / 260;
  for (let i = 0; i < 3; i++) {
    const lead = 0.3 + Math.random() * 1.0;
    const target = bp.clone().addScaledVector(bv, ft * lead);
    target.x += gaussRand() * 7; target.y += gaussRand() * 5; target.z += gaussRand() * 7;
    const dir = target.sub(from).normalize();
    const b = new THREE.Mesh(mgGeo, aaMat);
    b.position.copy(from).addScaledVector(dir, 3 + i * 1.4);
    scene.add(b);
    aaBullets.push({ mesh: b, vel: dir.multiplyScalar(260), life: 1.4 });
  }
  playNoise(0.06, 0.12, 900);
}
function updateAA(dt) {
  for (let i = aaBullets.length - 1; i >= 0; i--) {
    const b = aaBullets[i];
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;
    let done = b.life <= 0 || b.mesh.position.y <= groundHeight(b.mesh.position.x, b.mesh.position.z);
    if (!done && bomberActive && bomber && b.mesh.position.distanceTo(bomber.mesh.position) < 3.4) {
      bomber.hp -= 4 + Math.random() * 4;
      showDamageFlash();
      spawnParticles(b.mesh.position, 2, 0xffaa55, 0.3, 3);
      done = true;
      if (bomber.hp <= 0) crashBomber();
    }
    if (!done) {
      for (const ap of aiPlanes) {
        if (b.mesh.position.distanceTo(ap.mesh.position) < 3.4) {
          ap.hp -= 4 + Math.random() * 4;
          spawnParticles(b.mesh.position, 2, 0xffaa55, 0.3, 3);
          done = true;
          break;
        }
      }
    }
    if (done) { scene.remove(b.mesh); aaBullets.splice(i, 1); }
  }
}

function bombExplode(pos) {
  spawnFireball(pos, 14);
  spawnShockRing(pos, 26);
  spawnScorch(pos, 9);
  spawnParticles(pos, 14, 0xff8844, 1.0, 11);
  spawnParticles(pos, 8, 0xffc766, 0.6, 7);
  spawnSmoke(pos, 12);
  // 蘑菇烟柱
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.SphereGeometry(0.7 + Math.random()*0.9, 5, 5);
    const mat = new THREE.MeshBasicMaterial({ color: 0x3a3630, transparent: true, opacity: 0.75 });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(pos.x + (Math.random()-0.5)*2.5, pos.y + Math.random()*2, pos.z + (Math.random()-0.5)*2.5);
    scene.add(p);
    particles.push({ mesh: p, vel: new THREE.Vector3((Math.random()-0.5)*1.2, 5.5 + Math.random()*4, (Math.random()-0.5)*1.2), life: 2.4 + Math.random(), isSmoke: true });
  }
  const light = new THREE.PointLight(0xff7733, 14, 60);
  light.position.copy(pos); scene.add(light);
  setTimeout(() => scene.remove(light), 420);
  camShake = 1.4;
  playNoise(0.7, 0.8, 70);
  for (const t of [player, ...enemies, ...allies]) {
    if (!t.alive) continue;
    const d = Math.hypot(t.mesh.position.x - pos.x, t.mesh.position.z - pos.z);
    if (d < 20) damageTank(t, 110 * (1 - d / 20) + 20, player);
  }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    if (ob.hp === undefined) continue;
    const d = Math.hypot(ob.x - pos.x, ob.z - pos.z);
    if (d < 16) damageObstacle(ob, 140 * (1 - d / 16) + 30, new THREE.Vector3(ob.x, pos.y + 1, ob.z));
  }
}

function updateBombs(dt) {
  for (let i = bombs.length - 1; i >= 0; i--) {
    const b = bombs[i];
    b.vel.y -= 12 * dt;
    b.mesh.position.addScaledVector(b.vel, dt);
    _bombVn.copy(b.vel).normalize();
    b.mesh.quaternion.setFromUnitVectors(_bombAxis, _bombVn);
    let boom = b.mesh.position.y <= groundHeight(b.mesh.position.x, b.mesh.position.z) + 0.3;
    if (!boom && shellHitsObstacle(b.mesh.position, 0.4)) boom = true;
    if (boom) {
      if (b === bombCamBomb) {
        bombCamMode = 2;
        bombCamTimer = 1.0;
        bombCamPos.copy(b.mesh.position);
        bombCamBomb = null;
      }
      bombExplode(b.mesh.position.clone());
      scene.remove(b.mesh);
      bombs.splice(i, 1);
    }
  }
}

function updateBomber(dt) {
  const p = bomber;
  if (!p) return;
  // 投弹跟拍计时
  if (bombCamMode === 2) {
    bombCamTimer -= dt;
    if (bombCamTimer <= 0) bombCamMode = 0;
  }
  const camAway = bombCamMode !== 0;
  // ---- 教官系统: 机体追随视线 (跟拍期间自动爬升脱离) ----
  const desiredPitch = camAway ? 0.45 : Math.max(-1.45, Math.min(1.45, -cameraPitch));
  const yawDiff = camAway ? 0 : normalizeAngle(cameraYaw - p.yaw);
  const yawRate = (0.55 + 18 / Math.max(p.speed, 20)) * dt;
  p.yaw += Math.max(-yawRate, Math.min(yawRate, yawDiff));
  const pitchRate = 1.25 * dt;
  p.pitch += Math.max(-pitchRate, Math.min(pitchRate, desiredPitch - p.pitch));
  // ---- 能量机动 (喷气动力) ----
  const thr = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
  if (camAway) p.targetSpeed = moveToward(p.targetSpeed, 78, 34 * dt);
  else p.targetSpeed = Math.max(30, Math.min(95, p.targetSpeed + thr * 24 * dt));
  p.speed += ((p.targetSpeed - p.speed) * 0.7 - Math.sin(p.pitch) * 8) * dt;
  p.speed = Math.max(22, Math.min(120, p.speed));
  // 失速低头
  if (p.speed < 30) p.pitch = moveToward(p.pitch, -0.5, (30 - p.speed) * 0.09 * dt);
  // ---- 位移 ----
  const cp = Math.cos(p.pitch);
  const m = p.mesh;
  m.position.x += Math.sin(p.yaw) * cp * p.speed * dt;
  m.position.y += Math.sin(p.pitch) * p.speed * dt;
  m.position.z += Math.cos(p.yaw) * cp * p.speed * dt;
  if (m.position.y > 160) { m.position.y = 160; if (p.pitch > 0) p.pitch *= 0.9; }
  // ---- 姿态: 转弯自动压坡 + A/D 手动横滚 ----
  const rollIn = (keys['a'] ? 1 : 0) - (keys['d'] ? 1 : 0);
  const bank = Math.max(-1.25, Math.min(1.25, -yawDiff * 2.0)) + rollIn * 0.9;
  p.roll += (bank - p.roll) * Math.min(1, dt * 4);
  m.rotation.y = p.yaw;
  m.rotation.x = -p.pitch;
  m.rotation.z = p.roll;
  for (const pr of p.props) pr.rotation.z += (30 + p.speed) * dt;
  // ---- 坠毁判定 (无边界: 可自由飞出战区) ----
  if (m.position.y <= groundHeight(m.position.x, m.position.z) + 2 || shellHitsObstacle(m.position, 1.5)) {
    crashBomber();
    return;
  }
  // ---- 武器 (跟拍期间锁定) ----
  bombCool -= dt; planeMgCool -= dt;
  if (mouseDown && bombsLeft > 0 && bombCool <= 0 && !camAway) dropBomb();
  if (keys[' '] && planeMgCool <= 0 && !camAway) planeMG();
  if (bombsLeft <= 0 && bombCool < -6 && bombCamMode === 0) { convertToAIPlane(); return; }
}

function updateBombSight() {

let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playNoise(dur, vol, freq) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * dur;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * Math.max(0, 1 - i/bufferSize);
  const source = audioCtx.createBufferSource(); source.buffer = buffer;
  const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = freq;
  const gain = audioCtx.createGain(); gain.gain.value = vol;
  source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  source.start();
}

// ==================== HELPER ====================
function normalizeAngle(a) { while (a > Math.PI) a -= Math.PI*2; while (a < -Math.PI) a += Math.PI*2; return a; }
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI*2;
  while (d < -Math.PI) d += Math.PI*2;
  return a + d * Math.min(t, 1);
}

// ==================== DRIVE MODEL (换挡延迟) ====================
function moveToward(v, target, maxDelta) {
  if (v < target) return Math.min(target, v + maxDelta);
  return Math.max(target, v - maxDelta);
}
function updateDrive(tank, throttle, dt) {
  const desired = throttle > 0 ? 1 : (throttle < 0 ? -1 : 0);
  if (tank.shiftTimer > 0) {
    tank.shiftTimer -= dt;
    tank.speed = moveToward(tank.speed, 0, 6 * dt);
    if (tank.shiftTimer <= 0) tank.gear = tank.pendingGear;
    return;
  }
  if (desired === 0) {
    tank.speed = moveToward(tank.speed, 0, 5 * dt);
    if (Math.abs(tank.speed) < 0.05) { tank.speed = 0; tank.gear = 0; }
    return;
  }
  if (desired !== tank.gear) {
    if (Math.abs(tank.speed) > 0.4) {
      tank.speed = moveToward(tank.speed, 0, 9 * dt);
    } else {
      tank.pendingGear = desired;
      tank.shiftTimer = 0.35;
    }
    return;
  }
  const maxSpd = desired > 0 ? (tank.maxFwd || 11) : (tank.maxRev || 6);
  const accel = (desired > 0 ? 1 : 0.78) * (tank.accel || 4.5);
  tank.speed = moveToward(tank.speed, desired * maxSpd, accel * dt);
}

// ==================== GAUSSIAN (Box-Muller, 截断2.2σ) ====================
function gaussRand() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  const n = Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  return Math.max(-2.2, Math.min(2.2, n));
}

// ==================== TURRET AIMING (局部空间, 支持车体倾斜) ====================
const raycaster = new THREE.Raycaster();
const _aimInvQ = new THREE.Quaternion();
function aimTurret(tank, targetPoint, dt) {
  if (!tank.alive) return;
  const turretPos = new THREE.Vector3();
  tank.turretPivot.getWorldPosition(turretPos);
  const dirL = new THREE.Vector3().subVectors(targetPoint, turretPos);
  _aimInvQ.copy(tank.mesh.quaternion).invert();
  dirL.applyQuaternion(_aimInvQ).normalize();
  const localTargetYaw = Math.atan2(dirL.x, dirL.z);
  tank.turretPivot.rotation.y = lerpAngle(tank.turretPivot.rotation.y, localTargetYaw, dt*(tank.isEnemy?2.5:3));
  const horizDist = Math.sqrt(dirL.x*dirL.x + dirL.z*dirL.z);
  const targetPitch = Math.atan2(dirL.y, horizDist);
  const clampedPitch = Math.max(-0.12, Math.min(0.3, targetPitch));
  tank.barrelPivot.rotation.x += (-clampedPitch - tank.barrelPivot.rotation.x) * Math.min(1, dt*5);
}

// ==================== SHOOT ====================
function shoot(tank, isEnemy) {
  if (!tank.alive || tank.reload > 0) return;
  initAudio();
  tank.reload = tank.reloadTime;
  tank.recoil = 0.3;
  const muzzlePos = new THREE.Vector3();
  tank.barrelPivot.getWorldPosition(muzzlePos);
  const barrelDir = new THREE.Vector3();
  tank.barrelPivot.getWorldDirection(barrelDir);
  muzzlePos.add(barrelDir.clone().multiplyScalar(3.6));
  let dir = barrelDir.clone();
  if (isEnemy) {
    const s = tank.aimSpread !== undefined ? tank.aimSpread : 0.02;
    const up = new THREE.Vector3(0, 1, 0);
    const side = new THREE.Vector3().crossVectors(dir, up).normalize();
    dir.applyAxisAngle(up, gaussRand() * s);
    dir.applyAxisAngle(side, gaussRand() * s);
    dir.normalize();
    tank.aimSpread = Math.min(0.08, s + 0.02);
  }
  const shell = new THREE.Mesh(shellGeo, shellMat);
  shell.position.copy(muzzlePos); shell.castShadow = true;
  const speed = tank.shellSpeed || 150;
  const vel = dir.clone().multiplyScalar(speed);
  scene.add(shell);
  const dmg = tank.dmgMin !== undefined ? tank.dmgMin + Math.random() * (tank.dmgMax - tank.dmgMin) : 25 + Math.random() * 15;
  const shellObj = { mesh: shell, vel, life: 4, shooter: tank, dmg };
  shells.push(shellObj);

  playNoise(0.15, 0.3, 600);
}
