<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到苹罐的游戏站点</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        /* --- 背景呼吸光动画 --- */
        @keyframes gradient-breathing {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            /* 马卡龙色系渐变背景 */
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #c3f0c3, #e0c3fc);
            background-size: 400% 400%;
            animation: gradient-breathing 6s ease infinite;
            color: #1f2937;
        }

        /* 卡片脉冲动画 */
        @keyframes dramatic-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); }
            50% { transform: scale(1.02); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); }
        }

        .game-card:hover {
            transform: scale(1.05) rotate(1deg) translateY(-8px) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
        }
        
        .game-card {
            animation: dramatic-pulse 4s infinite ease-in-out;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.85); 
        }
        
        /* 针对特定卡片背景色的微调 */
        .game-card.bg-pink-100 { background-color: rgba(255, 228, 230, 0.9); }
        .game-card.bg-orange-100 { background-color: rgba(255, 237, 213, 0.9); }
        .game-card.bg-indigo-100 { background-color: rgba(224, 231, 255, 0.9); }
        .game-card.bg-purple-100 { background-color: rgba(243, 232, 255, 0.9); }
        
        .game-card.bg-pink-100:hover { background-color: rgba(255, 205, 210, 0.95); }
        .game-card.bg-orange-100:hover { background-color: rgba(254, 215, 170, 0.95); }
        .game-card.bg-indigo-100:hover { background-color: rgba(199, 210, 254, 0.95); }
        .game-card.bg-purple-100:hover { background-color: rgba(221, 214, 254, 0.95); }

        @media (max-width: 640px) {
            .game-card { padding: 1.5rem; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative">

    <audio id="bg-music" loop autoplay>
        <source src="https://game.pkmiao.com/Peace_and_Tranquility.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
    </audio>

    <button id="music-btn" class="fixed top-[66px] right-4 z-50 p-3 rounded-full bg-white/60 hover:bg-white/90 backdrop-blur-md shadow-lg transition-all duration-300 group border-2 border-white/50" onclick="toggleMusic()">
        
        <div class="text-gray-500 group-hover:text-gray-800 transition-colors w-6 h-6 flex items-center justify-center">
            
            <svg id="icon-play" class="hidden w-full h-full fill-current" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>

            <svg id="icon-pause" class="w-full h-full fill-current" viewBox="0 0 24 24">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            
        </div>
    </button>

    <script>
        const music = document.getElementById('bg-music');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const musicBtn = document.getElementById('music-btn');
        
        let isPlaying = true;

        document.addEventListener('DOMContentLoaded', function() {
            var playPromise = music.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Autoplay started");
                    musicBtn.classList.add('animate-spin-slow'); 
                })
                .catch(error => {
                    console.log("Autoplay prevented. Waiting for user interaction.");
                    isPlaying = false;
                    updateIcons();
                });
            }
        });

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                isPlaying = false;
            } else {
                music.play();
                isPlaying = true;
            }
            updateIcons();
        }

        function updateIcons() {
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            }
        }
    </script>
    <div class="max-w-7xl w-full text-center">
        <h1 class="text-3xl sm:text-5xl font-extrabold mb-10 text-gray-800 tracking-tight drop-shadow-sm">
            欢迎来到苹罐的游戏站点，你需要什么？
        </h1>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            
            <a href="https://game.pkmiao.com/hatshoot/" target="_blank" class="game-card block p-6 rounded-3xl border-4 border-black bg-pink-100 shadow-xl hover:bg-pink-200 transform hover:rotate-1 transition-all duration-400 ease-in-out cursor-pointer group flex flex-col justify-between h-full">
                <div class="flex flex-col items-center flex-grow justify-center">
                    <div class="text-6xl mb-4 transition-transform group-hover:scale-110">🎩</div>
                    <h2 class="text-2xl sm:text-3xl font-black mb-3 text-black uppercase">帽孩出击</h2>
                    <p class="text-base sm:text-lg text-gray-700 font-semibold">帽孩为主角的第三人称射击游戏</p>
                </div>
                <div class="mt-6 text-base font-bold text-gray-900 group-hover:text-pink-600 transition-colors">开始游戏 →</div>
            </a>

            <a href="https://game.pkmiao.com/tank3d/" target="_blank" class="game-card block p-6 rounded-3xl border-4 border-black bg-orange-100 shadow-xl hover:bg-orange-200 transform hover:rotate-1 transition-all duration-400 ease-in-out cursor-pointer group flex flex-col justify-between h-full">
                <div class="flex flex-col items-center flex-grow justify-center">
                    <div class="text-6xl mb-4 transition-transform group-hover:scale-110">🛩️</div>
                    <h2 class="text-2xl sm:text-3xl font-black mb-3 text-black uppercase">坦克3D</h2>
                    <p class="text-base sm:text-lg text-gray-700 font-semibold">由B站up主bili_3493108501187431制作的类战雷游戏</p>
                </div>
                <div class="mt-6 text-base font-bold text-gray-900 group-hover:text-orange-600 transition-colors">开始游戏 →</div>
            </a>

            <a href="https://game.pkmiao.com/bf/钢铁前线1944.html" target="_blank" class="game-card block p-6 rounded-3xl border-4 border-black bg-indigo-100 shadow-xl hover:bg-indigo-200 transform hover:-rotate-1 transition-all duration-400 ease-in-out cursor-pointer group flex flex-col justify-between h-full">
                <div class="flex flex-col items-center flex-grow justify-center">
                    <div class="text-6xl mb-4 transition-transform group-hover:scale-110 group-hover:-rotate-12">🎖️</div>
                    <h2 class="text-2xl sm:text-3xl font-black mb-3 text-black uppercase">钢铁前线</h2>
                    <p class="text-base sm:text-lg text-gray-700 font-semibold">由B站up主stupid_scout制作的类战地游戏</p>
                </div>
                <div class="mt-6 text-base font-bold text-gray-900 group-hover:text-indigo-600 transition-colors">开始游戏 →</div>
            </a>

            <a href="https://game.pkmiao.com/wrsk/" target="_blank" class="game-card block p-6 rounded-3xl border-4 border-black bg-purple-100 shadow-xl hover:bg-purple-200 transform hover:-rotate-1 transition-all duration-400 ease-in-out cursor-pointer group flex flex-col justify-between h-full">
                <div class="flex flex-col items-center flex-grow justify-center">
                    <div class="text-6xl mb-4 transition-transform group-hover:scale-110">🌌</div>
                    <h2 class="text-2xl sm:text-3xl font-black mb-3 text-black uppercase">星穹熔炉</h2>
                    <p class="text-base sm:text-lg text-gray-700 font-semibold">由B站up主PotnQ制作的类我的世界+无人深空+异星工厂游戏（联机不可用，如需联机功能，在B站PotnQ视频下载完整游戏文件）</p>
                </div>
                <div class="mt-6 text-base font-bold text-gray-900 group-hover:text-purple-600 transition-colors">开始游戏 →</div>
            </a>

        </div>
    </div>

</body>
</html>
